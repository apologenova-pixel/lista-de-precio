<!DOCTYPE html>
<html lang="ES">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LISTA DE PRECIO | TECNO JUMP</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0F172A; --accent: #2563EB; --bg: #F1F5F9;
            --white: #FFFFFF; --text: #1E293B; --border: #E2E8F0;
            --success: #10B981; --warning: #F59E0B; --danger: #EF4444;
            /* Colores de Marca */
            --apple-color: #1E293B;
            --samsung-color: #034EA2;
            --motorola-color: #5D2D91;
            --generic-color: #64748B;
        }
        [data-theme="dark"] {
            --primary: #1E293B; --accent: #60A5FA; --bg: #0F172A; --white: #1E293B; --text: #F8FAFC; --border: #334155;
        }
        * { box-sizing: border-box; transition: all 0.2s ease; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 10px; margin: 0; text-transform: uppercase; letter-spacing: 0.3px; }
        .container { max-width: 1000px; margin: auto; padding-bottom: 40px; }
        
        /* Header con el nuevo nombre */
        .header { background: var(--primary); color: white; padding: 15px 20px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { font-size: 13px; margin: 0; font-weight: 800; letter-spacing: 1px; }
        
        .form-container { background: var(--white); padding: 20px; border-radius: 20px; border: 1px solid var(--border); display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 25px; }
        @media (min-width: 768px) { .form-container { grid-template-columns: repeat(4, 1fr); } .span-2 { grid-column: span 2; } .span-full { grid-column: 1 / -1; } }
        
        label { font-size: 9px; font-weight: 800; color: #64748B; margin-bottom: 4px; display: block; }
        input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--text); font-size: 13px; font-weight: 600; }
        
        .btn-main { border: none; padding: 14px; border-radius: 10px; cursor: pointer; font-weight: 800; color: white; font-size: 12px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
        #btnAdd { background: var(--accent); }
        #btnUpdate { background: var(--warning); color: #000; display: none; }

        .search-bar { width: 100%; padding: 16px; border-radius: 14px; border: 2px solid var(--border); font-size: 14px; font-weight: 600; background: var(--white); margin-bottom: 20px; outline: none; }

        .results-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        @media (min-width: 768px) { .results-grid { grid-template-columns: repeat(2, 1fr); } }

        .product-card { background: var(--white); border-radius: 18px; padding: 15px; position: relative; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }

        /* Etiqueta con sombra y colores de marca */
        .card-part-tag { 
            font-size: 10px; 
            font-weight: 800; 
            color: white; 
            padding: 6px 12px; 
            border-radius: 8px; 
            box-shadow: inset 0 -2px 0 rgba(0,0,0,0.2), 0 4px 6px -1px rgba(0,0,0,0.1);
            letter-spacing: 0.5px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        /* Precio a la derecha */
        .price-right { text-align: right; }
        .price-val { font-size: 20px; font-weight: 800; color: var(--success); display: block; }
        .price-label { font-size: 8px; font-weight: 700; color: #94A3B8; }

        .card-model { font-weight: 700; font-size: 14px; color: var(--text); margin-bottom: 15px; }
        
        .card-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 12px; }
        .cost-val { font-size: 10px; font-weight: 700; color: #94A3B8; }

        .card-actions { display: flex; gap: 6px; }
        .btn-action { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: transparent; cursor: pointer; font-size: 10px; font-weight: 700; color: var(--text); }

        /* Clases de marca para las etiquetas */
        .brand-apple .card-part-tag { background: var(--apple-color); }
        .brand-samsung .card-part-tag { background: var(--samsung-color); }
        .brand-motorola .card-part-tag { background: var(--motorola-color); }
        .brand-generic .card-part-tag { background: var(--generic-color); }
    </style>
</head>
<body data-theme="light">

<div class="container">
    <div class="header">
        <h1>LISTA DE PRECIO | TECNO JUMP <span id="dbTotal" style="opacity: 0.6; font-size: 10px; margin-left: 10px;">0 ITEMS</span></h1>
        <button onclick="window.toggleTheme()" style="background:none; border:none; color:white; cursor:pointer; font-size:16px;">🌓</button>
    </div>

    <div class="form-container">
        <input type="hidden" id="editIndex" value="-1">
        <div class="form-group span-2"><label>MODELO</label><input type="text" id="model" placeholder="EJ. IPHONE 15 PRO"></div>
        <div class="form-group span-2"><label>TIPO DE REPUESTO</label><input type="text" id="parts" placeholder="EJ. CAMBIO DE PANTALLA"></div>
        <div class="form-group"><label>COSTO</label><input type="number" id="buyPrice" placeholder="0"></div>
        <div class="form-group"><label>VENTA</label><input type="number" id="sellPrice" placeholder="0"></div>
        <div class="form-group span-full"><label>NOTAS</label><input type="text" id="comment" placeholder="..."></div>
        <div class="form-group span-full">
            <button class="btn-main" id="btnAdd" onclick="window.saveItem()">AÑADIR A LISTA</button>
            <button class="btn-main" id="btnUpdate" onclick="window.saveItem()">GUARDAR CAMBIOS</button>
        </div>
    </div>

    <input type="text" id="searchInput" class="search-bar" placeholder="🔍 BUSCAR REPUESTO O MODELO...">

    <div id="resultsWrapper" style="display:none;">
        <div id="resultsGrid" class="results-grid"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBm0Z1RWKsit3tp1TLCWtMYAsn2HkqMs0g",
        authDomain: "tecnojump-4f64b.firebaseapp.com",
        databaseURL: "https://tecno-jump-inventario-default-rtdb.firebaseio.com/",
        projectId: "tecnojump-4f64b",
        storageBucket: "tecnojump-4f64b.firebasestorage.app",
        messagingSenderId: "572737430972",
        appId: "1:572737430972:web:ab20f5417a93251db777b9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const inventoryRef = ref(db, 'inventario');
    
    let cacheData = [];

    onValue(inventoryRef, (snapshot) => {
        const data = snapshot.val() || {};
        cacheData = Object.keys(data).map(id => ({
            id, ...data[id],
            searchIndex: `${data[id].model} ${data[id].parts}`.toUpperCase()
        })).reverse();
        document.getElementById('dbTotal').innerText = cacheData.length + " ITEMS";
        applySearch();
    });

    document.getElementById('searchInput').addEventListener('input', applySearch);

    function applySearch() {
        const query = document.getElementById('searchInput').value.trim().toUpperCase();
        const wrapper = document.getElementById('resultsWrapper');
        if (query === "") { wrapper.style.display = 'none'; } 
        else { 
            const filtered = cacheData.filter(item => item.searchIndex.includes(query));
            renderCards(filtered);
            wrapper.style.display = 'block';
        }
    }

    function renderCards(data) {
        const grid = document.getElementById('resultsGrid');
        grid.innerHTML = '';
        data.forEach(item => {
            const m = item.model.toUpperCase();
            let bClass = 'brand-generic';
            if(m.includes('IPHONE') || m.includes('APPLE')) bClass = 'brand-apple';
            else if(m.includes('SAMSUNG')) bClass = 'brand-samsung';
            else if(m.includes('MOTO')) bClass = 'brand-motorola';

            const card = document.createElement('div');
            card.className = `product-card ${bClass}`;
            card.innerHTML = `
                <div class="card-top">
                    <div class="card-part-tag">${item.parts}</div>
                    <div class="price-right">
                        <span class="price-label">VENTA</span>
                        <span class="price-val">$${Number(item.sellPrice).toLocaleString('es-CL')}</span>
                    </div>
                </div>
                <span class="card-model">${item.model}</span>
                <div class="card-footer">
                    <span class="cost-val">COSTO: $${Number(item.buyPrice).toLocaleString('es-CL')}</span>
                    <div class="card-actions">
                        <button class="btn-action" onclick="window.editItem('${item.id}')">EDITAR</button>
                        <button class="btn-action" style="color:var(--danger)" onclick="window.deleteItem('${item.id}')">🗑️</button>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    window.saveItem = function() {
        const id = document.getElementById('editIndex').value;
        const itemData = {
            model: document.getElementById('model').value.toUpperCase(),
            parts: document.getElementById('parts').value.toUpperCase(),
            buyPrice: parseFloat(document.getElementById('buyPrice').value) || 0,
            sellPrice: parseFloat(document.getElementById('sellPrice').value) || 0,
            comment: document.getElementById('comment').value.toUpperCase()
        };
        if (!itemData.model || !itemData.parts) return;
        if (id === "-1") { push(inventoryRef, itemData).then(() => window.clearInputs()); } 
        else { 
            set(ref(db, 'inventario/' + id), itemData).then(() => {
                document.getElementById('editIndex').value = "-1";
                document.getElementById('btnAdd').style.display = 'flex';
                document.getElementById('btnUpdate').style.display = 'none';
                window.clearInputs();
            });
        }
    };

    window.editItem = function(id) {
        const item = cacheData.find(i => i.id === id);
        document.getElementById('model').value = item.model;
        document.getElementById('parts').value = item.parts;
        document.getElementById('buyPrice').value = item.buyPrice;
        document.getElementById('sellPrice').value = item.sellPrice;
        document.getElementById('comment').value = item.comment || '';
        document.getElementById('editIndex').value = id;
        document.getElementById('btnAdd').style.display = 'none';
        document.getElementById('btnUpdate').style.display = 'flex';
        window.scrollTo({top: 0, behavior: 'smooth'});
    };

    window.deleteItem = function(id) { if(confirm("¿ELIMINAR ESTE REGISTRO?")) remove(ref(db, 'inventario/' + id)); };
    window.clearInputs = function() { document.querySelectorAll('input:not([type=hidden])').forEach(i => i.value = ''); };
    window.toggleTheme = function() {
        const body = document.body;
        const newTheme = body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        body.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
    };
    if(localStorage.getItem('theme') === 'dark') document.body.setAttribute('data-theme', 'dark');
</script>
</body>
</html>
