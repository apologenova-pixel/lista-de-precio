<!DOCTYPE html>
<html lang="ES">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INVENTARIO | TECNO JUMP</title>
    <style>
        :root {
            --primary: #0F172A; --accent: #2563EB; --bg: #F8FAFC;
            --white: #FFFFFF; --text: #1E293B; --border: #E2E8F0;
        }
        [data-theme="dark"] {
            --primary: #1E293B; --accent: #3B82F6; --bg: #0F172A; --white: #1E293B; --text: #F8FAFC; --border: #334155;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 10px; margin: 0; text-transform: uppercase; }
        .container { max-width: 1400px; margin: auto; }
        .header { background: var(--primary); color: white; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .stats-card { background: var(--white); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border); text-align: center; }
        .stats-card span { font-size: 24px; font-weight: bold; color: var(--accent); display: block; }
        .form-container { background: var(--white); padding: 20px; border-radius: 12px; border: 1px solid var(--border); display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 20px; }
        @media (min-width: 768px) { .form-container { grid-template-columns: repeat(2, 1fr); } }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 11px; font-weight: bold; color: #64748B; }
        input { padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 16px; }
        .btn-main { border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; width: 100%; }
        #btnAdd { background: var(--accent); }
        #btnUpdate { background: #F59E0B; display: none; color: #000; }
        .search-bar { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 8px; border: 2px solid var(--accent); font-size: 16px; position: sticky; top: 10px; z-index: 100; background: var(--white); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .table-card { background: var(--white); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(0,0,0,0.02); padding: 15px; text-align: left; border-bottom: 2px solid var(--border); }
        td { padding: 12px 15px; border-bottom: 1px solid var(--border); }
        @media (max-width: 767px) {
            table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; }
            tr { background: var(--white); margin-bottom: 15px; border-radius: 12px; padding: 15px; border: 1px solid var(--border); }
            td { border: none; padding: 8px 0; position: relative; padding-left: 45%; text-align: right; border-bottom: 1px solid var(--border); }
            td:before { content: attr(data-label); position: absolute; left: 0; width: 40%; font-weight: bold; text-align: left; color: #64748B; }
            td:last-child { border-bottom: none; display: flex; justify-content: flex-end; gap: 10px; padding-top: 15px; }
        }
        .actions-btn { padding: 10px 15px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; background: var(--bg); }
    </style>
</head>
<body data-theme="light">

<div class="container">
    <div class="header">
        <h1>TECNO JUMP</h1>
        <button onclick="window.toggleTheme()" class="btn-main" style="width: auto; padding: 8px 15px;">🌓</button>
    </div>

    <div class="stats-card">PRODUCTOS <span id="itemCount">0</span></div>

    <div class="form-container">
        <input type="hidden" id="editIndex" value="-1">
        <div class="form-group"><label>MODELO</label><input type="text" id="model"></div>
        <div class="form-group"><label>REPUESTO</label><input type="text" id="parts"></div>
        <div class="form-group"><label>COSTO</label><input type="number" id="buyPrice" placeholder="0"></div>
        <div class="form-group"><label>VENTA</label><input type="number" id="sellPrice" placeholder="0"></div>
        <div class="form-group" style="grid-column: 1 / -1;"><label>NOTA</label><input type="text" id="comment"></div>
        <div class="form-group" style="grid-column: 1 / -1;">
            <button class="btn-main" id="btnAdd" onclick="window.saveItem()">REGISTRAR</button>
            <button class="btn-main" id="btnUpdate" onclick="window.saveItem()">GUARDAR CAMBIOS</button>
        </div>
    </div>

    <input type="text" id="searchInput" class="search-bar" placeholder="BUSCAR PRODUCTO...">

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th>MODELO</th><th>REPUESTO</th><th>COSTO</th><th>VENTA</th><th>NOTAS</th><th>ACCIONES</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBm0Z1RWKsit3tp1TLCWtMYAsn2HkqMs0g",
        authDomain: "tecnojump-4f64b.firebaseapp.com",
        databaseURL: "https://tecno-jump-inventario-default-rtdb.firebaseio.com/",
        projectId: "tecnojump-4f64b",
        storageBucket: "tecnojump-4f64b.firebasestorage.app",
        messagingSenderId: "572737430972",
        appId: "1:572737430972:web:ab20f5417a93251db777b9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const inventoryRef = ref(db, 'inventario');
    
    let cacheData = []; // Los datos se guardan aquí para búsqueda instantánea
    let filteredData = [];
    let searchTimer;

    // Sincronización eficiente con Firebase
    onValue(inventoryRef, (snapshot) => {
        const data = snapshot.val() || {};
        // Convertimos a array y pre-procesamos el texto para que la búsqueda no sea pesada
        cacheData = Object.keys(data).map(id => ({
            id,
            ...data[id],
            searchIndex: `${data[id].model} ${data[id].parts} ${data[id].comment || ''}`.toUpperCase()
        })).reverse();
        
        document.getElementById('itemCount').innerText = cacheData.length;
        applySearch();
    });

    // Función de búsqueda optimizada (Debounce)
    document.getElementById('searchInput').addEventListener('input', (e) => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
            applySearch();
        }, 200); // Espera 200ms después de escribir para no trabar el navegador
    });

    function applySearch() {
        const query = document.getElementById('searchInput').value.toUpperCase();
        filteredData = cacheData.filter(item => item.searchIndex.includes(query));
        renderTable();
    }

    function renderTable() {
        const tableBody = document.getElementById('tableBody');
        const fragment = document.createDocumentFragment();
        tableBody.innerHTML = '';

        // Solo mostramos los primeros 100 resultados para mantener la velocidad
        // Si necesitas ver más, la búsqueda filtrará el resto
        const limit = Math.min(filteredData.length, 100);

        for(let i = 0; i < limit; i++) {
            const item = filteredData[i];
            const row = document.createElement('tr');
            row.innerHTML = `
                <td data-label="MODELO">${(item.model || '').toUpperCase()}</td>
                <td data-label="REPUESTO">${(item.parts || '').toUpperCase()}</td>
                <td data-label="COSTO">$${Number(item.buyPrice || 0).toLocaleString('es-CL')}</td>
                <td data-label="VENTA">$${Number(item.sellPrice || 0).toLocaleString('es-CL')}</td>
                <td data-label="NOTAS">${(item.comment || '-').toUpperCase()}</td>
                <td data-label="ACCIONES">
                    <button class="actions-btn" onclick="window.editItem('${item.id}')">✏️</button>
                    <button class="actions-btn" onclick="window.deleteItem('${item.id}')">🗑️</button>
                </td>`;
            fragment.appendChild(row);
        }
        tableBody.appendChild(fragment);
    }

    window.saveItem = function() {
        const id = document.getElementById('editIndex').value;
        const itemData = {
            model: document.getElementById('model').value.trim(),
            parts: document.getElementById('parts').value.trim(),
            buyPrice: parseFloat(document.getElementById('buyPrice').value) || 0,
            sellPrice: parseFloat(document.getElementById('sellPrice').value) || 0,
            comment: document.getElementById('comment').value.trim()
        };

        if (!itemData.model || !itemData.parts) return alert("COMPLETA LOS CAMPOS");

        if (id === "-1") {
            push(inventoryRef, itemData).then(() => window.clearInputs());
        } else { 
            set(ref(db, 'inventario/' + id), itemData).then(() => {
                document.getElementById('editIndex').value = "-1";
                document.getElementById('btnAdd').style.display = 'block';
                document.getElementById('btnUpdate').style.display = 'none';
                window.clearInputs();
            });
        }
    };

    window.editItem = function(id) {
        const item = cacheData.find(i => i.id === id);
        document.getElementById('model').value = item.model;
        document.getElementById('parts').value = item.parts;
        document.getElementById('buyPrice').value = item.buyPrice;
        document.getElementById('sellPrice').value = item.sellPrice;
        document.getElementById('comment').value = item.comment || '';
        document.getElementById('editIndex').value = id;
        document.getElementById('btnAdd').style.display = 'none';
        document.getElementById('btnUpdate').style.display = 'block';
        window.scrollTo({top: 0, behavior: 'smooth'});
    };

    window.deleteItem = function(id) { 
        if(confirm("¿ELIMINAR?")) remove(ref(db, 'inventario/' + id)); 
    };

    window.clearInputs = function() {
        document.querySelectorAll('input:not([type=hidden])').forEach(i => i.value = '');
    };

    window.toggleTheme = function() {
        const body = document.body;
        const newTheme = body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        body.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
    };

    if(localStorage.getItem('theme') === 'dark') document.body.setAttribute('data-theme', 'dark');
</script>
</body>
</html>
