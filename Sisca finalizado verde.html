/* ---------------- REPORTES (gráficos SVG propios, sin librerías externas) ---------------- */
function svgBarras(datos, opts){
  opts = opts||{};
  const w = opts.width||560, h = opts.height||220, pad = 34;
  const max = Math.max(1, ...datos.map(d=>d.valor));
  const bw = (w - pad*1.5) / datos.length;
  const color = opts.color || 'var(--primary)';
  let bars = '', labels = '';
  datos.forEach((d,i)=>{
    const bh = (d.valor/max) * (h - pad*2);
    const x = pad + i*bw + bw*0.15;
    const y = h - pad - bh;
    bars += `<rect x="${x}" y="${y}" width="${bw*0.7}" height="${bh}" rx="4" fill="${color}"><title>${d.label}: ${d.valor}</title></rect>
             <text x="${x+bw*0.35}" y="${y-6}" font-size="10.5" text-anchor="middle" fill="#5B6B67" font-family="Courier New, monospace">${opts.fmt?opts.fmt(d.valor):d.valor}</text>`;
    labels += `<text x="${x+bw*0.35}" y="${h-pad+16}" font-size="10" text-anchor="middle" fill="#5B6B67">${d.label}</text>`;
  });
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:${h}px;">
    <line x1="${pad}" y1="${h-pad}" x2="${w-8}" y2="${h-pad}" stroke="#DCE3E0" stroke-width="1.5"/>
    ${bars}${labels}
  </svg>`;
}
function svgRanking(datos, opts){
  opts = opts||{};
  const max = Math.max(1, ...datos.map(d=>d.valor));
  return `<div>${datos.map(d=>`
    <div style="margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;">
        <span>${d.label}</span><span class="mono" style="font-weight:600;">${opts.fmt?opts.fmt(d.valor):d.valor}</span>
      </div>
      <div style="background:#EEF1F0;border-radius:6px;height:9px;overflow:hidden;">
        <div style="background:${opts.color||'var(--primary)'};height:100%;width:${Math.max(4,100*d.valor/max)}%;border-radius:6px;"></div>
      </div>
    </div>`).join('')}</div>`;
}
function promedioHoras(paresFechas){
  if(!paresFechas.length) return null;
  const horas = paresFechas.map(([desde,hasta])=> (new Date(hasta)-new Date(desde))/36e5 ).filter(h=>h>=0);
  if(!horas.length) return null;
  return horas.reduce((s,h)=>s+h,0)/horas.length;
}
function renderReportes(){
  const f = listFilters.reportes;
  let despachados = DB.pedidos.filter(p=>p.estado==='Despachado');
  let facturasBase = DB.facturas.slice();
  if(f.desde || f.hasta){
    despachados = despachados.filter(p=>dentroDeRango(p.fecha, f.desde, f.hasta));
    facturasBase = facturasBase.filter(x=>dentroDeRango(x.fechaEmision, f.desde, f.hasta));
  }

  // Ventas por mes (últimos 6 meses, o todo el rango si hay filtro activo)
  const meses = [];
  for(let i=5;i>=0;i--){
    const d = new Date(); d.setDate(1); d.setMonth(d.getMonth()-i);
    meses.push({label:d.toLocaleDateString('es-CL',{month:'short'}), key:d.getFullYear()+'-'+d.getMonth(), valor:0});
  }
  despachados.forEach(p=>{
    const d = new Date(p.fecha); const key = d.getFullYear()+'-'+d.getMonth();
    const m = meses.find(x=>x.key===key);
    if(m) m.valor += p.total;
  });

  // Productos más vendidos (por cantidad)
  const cantidadPorProducto = {};
  despachados.forEach(p=>p.items.forEach(it=>{ cantidadPorProducto[it.productoId] = (cantidadPorProducto[it.productoId]||0) + it.cantidad; }));
  const topProductos = Object.entries(cantidadPorProducto)
    .map(([pid,cant])=>({label: (DB.productos.find(x=>x.id===pid)||{nombre:pid}).nombre, valor:cant}))
    .sort((a,b)=>b.valor-a.valor).slice(0,6);

  // Ranking de clientes por total facturado
  const totalPorCliente = {};
  facturasBase.forEach(f2=>{ totalPorCliente[f2.clienteId] = (totalPorCliente[f2.clienteId]||0) + f2.monto; });
  const topClientes = Object.entries(totalPorCliente)
    .map(([cid,total])=>({label: clienteNombre(cid), valor: total}))
    .sort((a,b)=>b.valor-a.valor).slice(0,6);

  const totalVentas = despachados.reduce((s,p)=>s+p.total,0);
  const ticketPromedio = despachados.length ? totalVentas/despachados.length : 0;
  const activo = f.desde || f.hasta;

  // Tiempos de ciclo (en horas) para detectar cuellos de botella
  const cotizacionesConPedido = DB.cotizaciones.filter(c=>c.fechaAprobada);
  const horasCotAprobar = promedioHoras(cotizacionesConPedido.map(c=>[c.fecha, c.fechaAprobada]));
  const pedidosConOrigen = DB.pedidos.filter(p=>{ const c=DB.cotizaciones.find(x=>x.id===p.cotId); return c && c.fechaAprobada; });
  const horasAprobarPedido = promedioHoras(pedidosConOrigen.map(p=>{ const c=DB.cotizaciones.find(x=>x.id===p.cotId); return [c.fechaAprobada, p.fecha]; }));
  const pedidosConListo = DB.pedidos.filter(p=>p.fechaListo);
  const horasPreparacion = promedioHoras(pedidosConListo.map(p=>[p.fecha, p.fechaListo]));
  const despachosConOrigen = DB.despachos.map(d=>{ const p=DB.pedidos.find(x=>x.id===d.pedidoId); return p&&p.fechaListo ? [p.fechaListo, d.fecha] : null; }).filter(Boolean);
  const horasDespacho = promedioHoras(despachosConOrigen);
  const tieneCiclos = horasCotAprobar!==null || horasPreparacion!==null || horasDespacho!==null;

  return `
  <div class="panel" style="margin-bottom:16px;">
    ${filtroBarra('reportes', {search:false})}
  </div>
  ${activo?`<div class="locked-note" style="margin-bottom:16px;">Mostrando datos filtrados por fecha${f.desde?` desde ${fmtDate(f.desde)}`:''}${f.hasta?` hasta ${fmtDate(f.hasta)}`:''}.</div>`:''}
  <div class="grid-cards">
    <div class="card"><div class="label">Ventas totales despachadas</div><div class="value">${fmtCLP(totalVentas)}</div></div>
    <div class="card"><div class="label">Pedidos despachados</div><div class="value">${despachados.length}</div></div>
    <div class="card"><div class="label">Ticket promedio</div><div class="value">${fmtCLP(ticketPromedio)}</div></div>
  </div>

  <div class="panel"><div class="panel-head"><h3>📊 KPIs operativos</h3></div><div class="panel-body pad">
    ${(()=>{
      const cotResueltas = DB.cotizaciones.filter(c=>c.estado==='Aprobada' || c.estado==='Rechazada');
      const tasaConversion = cotResueltas.length ? Math.round(100*DB.cotizaciones.filter(c=>c.estado==='Aprobada').length/cotResueltas.length) : null;

      const entregasResueltas = DB.despachos.filter(d=>d.estadoEntrega==='Entregado' || d.estadoEntrega==='Rebotado');
      const entregadasPrimerIntento = DB.despachos.filter(d=>d.estadoEntrega==='Entregado' && (!d.reagendamientos || d.reagendamientos.length===0));
      const otif = entregasResueltas.length ? Math.round(100*entregadasPrimerIntento.length/entregasResueltas.length) : null;

      const rebotados = DB.despachos.filter(d=>(d.reagendamientos||[]).length>0);
      const rebotadosResueltos = rebotados.filter(d=>d.estadoEntrega==='Entregado');
      const efectReagenda = rebotados.length ? Math.round(100*rebotadosResueltos.length/rebotados.length) : null;

      const ultimaAuditoria = (DB.auditorias||[]).slice(-1)[0];

      const kpis = [
        {label:'Tasa de conversión de cotizaciones', valor: tasaConversion, meta:'Cotizaciones aprobadas vs. total resueltas'},
        {label:'Índice OTIF (entregas a tiempo y completas)', valor: otif, meta:'Entregado sin rebote en el primer intento'},
        {label:'Efectividad de reagendamiento', valor: efectReagenda, meta:'Rebotados que finalmente se entregaron'},
        {label:'Exactitud de inventario cíclico', valor: ultimaAuditoria?ultimaAuditoria.exactitud:null, meta:'Última auditoría: '+(ultimaAuditoria?fmtDate(ultimaAuditoria.fecha):'sin registrar')},
      ];
      return `<div class="grid-cards grid-cards-2" style="margin-bottom:0;">
        ${kpis.map(k=>`<div class="card"><div class="label">${k.label}</div>
          <div class="value">${k.valor===null?'—':k.valor+'%'}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:4px;">${k.valor===null?'Aún sin datos suficientes':k.meta}</div></div>`).join('')}
      </div>`;
    })()}
  </div></div>

  <div class="panel"><div class="panel-head"><h3>⏱ Tiempos de ciclo — dónde está el cuello de botella</h3></div><div class="panel-body pad">
    ${tieneCiclos ? svgRanking([
      {label:'Cotización → Aprobación', valor: horasCotAprobar||0},
      {label:'Aprobación → Pedido generado', valor: horasAprobarPedido||0},
      {label:'Pedido → Preparado (bodega)', valor: horasPreparacion||0},
      {label:'Preparado → Despachado', valor: horasDespacho||0},
    ], {fmt:v=>v<24?Math.round(v)+'h':Math.round(v/24)+'d'}) : '<div class="empty-actions">Aún no hay suficientes cotizaciones aprobadas y despachadas para calcular tiempos de ciclo.</div>'}
    ${tieneCiclos?'<div style="font-size:11px;color:var(--muted);margin-top:8px;">La etapa con la barra más larga es donde más se demora tu proceso — ahí conviene enfocar mejoras.</div>':''}
  </div></div>

  <div class="panel"><div class="panel-head"><h3>Ventas por mes</h3></div><div class="panel-body pad">
    ${despachados.length ? svgBarras(meses, {fmt:v=>v>=1000?Math.round(v/1000)+'k':v}) : '<div class="empty-actions">Aún no hay ventas despachadas para graficar.</div>'}
  </div></div>

  <div class="grid-cards grid-cards-2" style="align-items:start;">
    <div class="panel"><div class="panel-head"><h3>Productos más vendidos</h3></div><div class="panel-body pad">
      ${topProductos.length ? svgRanking(topProductos) : '<div class="empty-actions">Sin datos aún.</div>'}
    </div></div>
    <div class="panel"><div class="panel-head"><h3>Ranking de clientes</h3></div><div class="panel-body pad">
      ${topClientes.length ? svgRanking(topClientes, {color:'var(--navy)', fmt:fmtCLP}) : '<div class="empty-actions">Sin datos aún.</div>'}
    </div></div>
  </div>`;
}

function renderInteligencia(){
  const f = listFilters.inteligencia;
  let data = DB.inteligencia.slice().reverse();
  data = data.filter(d=>{
    if(!coincideTexto(clienteNombre(d.clienteId)+' '+d.cotId, f.q)) return false;
    if((f.desde||f.hasta) && !dentroDeRango(d.fecha, f.desde, f.hasta)) return false;
    return true;
  });
  const porClasificacion = {};
  data.forEach(d=>{ porClasificacion[d.clasificacion]=(porClasificacion[d.clasificacion]||0)+1; });
  const top = Object.entries(porClasificacion).sort((a,b)=>b[1]-a[1])[0];
  let insight = '';
  if(top && data.length>=3){
    insight = `<div class="locked-note">📊 Insight de negocio: el <b>${Math.round(100*top[1]/data.length)}%</b> de los rechazos registrados se deben a "<b>${top[0]}</b>". ${top[0]==='Precio'?'Vale la pena revisar la política de descuentos por volumen o segmento antes de seguir perdiendo cotizaciones por este motivo.':'Conviene priorizar acciones correctivas en esta causa específica.'}</div>`;
  }
  const rows = data.map(d=>`<tr><td class="mono">${d.cotId}</td><td>${clienteNombre(d.clienteId)}</td><td>${fmtDate(d.fecha)}</td>
    <td>${fmtCLP(d.monto)}</td><td><span class="badge red">${d.clasificacion}</span></td><td>${d.detalle||'—'}</td></tr>`).join('');
  return `${insight}
  <div class="panel"><div class="panel-head"><h3>Historial de rechazos — Inteligencia Comercial</h3></div>
    ${filtroBarra('inteligencia', {placeholder:'Buscar por cliente o cotización...'})}
    <div class="panel-body">
    <table><thead><tr><th>Cotización</th><th>Cliente</th><th>Fecha</th><th>Monto</th><th>Motivo</th><th>Detalle</th></tr></thead>
    <tbody>${rows || `<tr class="empty-row"><td colspan="6">${emptyState('inteligencia','Aún no hay rechazos registrados','Cuando rechaces una cotización, el motivo quedará aquí para detectar patrones.')}</td></tr>`}</tbody></table>
  </div></div>`;
}

/* ---------------- MODAL HELPERS ---------------- */
function val(id){ const el=document.getElementById(id); return el?el.value.trim():''; }
function showModal(title, bodyHTML, onSave, readOnly){
  const box = document.getElementById('modalBox');
  box.innerHTML = `<div class="modal-head"><h3>${title}</h3><button class="modal-close" data-action="close-modal">✕</button></div>
  <div class="modal-body">${bodyHTML}</div>
  <div class="modal-foot">
    <button class="btn btn-ghost" data-action="close-modal">${readOnly?'Cerrar':'Cancelar'}</button>
    ${readOnly?'':'<button class="btn btn-primary" id="modalSaveBtn">Guardar</button>'}
  </div>`;
  document.getElementById('overlay').classList.add('show');
  if(!readOnly) document.getElementById('modalSaveBtn').onclick = onSave;
}
function closeModal(){ document.getElementById('overlay').classList.remove('show'); }
document.getElementById('overlay').addEventListener('click', e=>{ if(e.target.id==='overlay') closeModal(); });

function filterTable(input, tableId){
  const q = input.value.toLowerCase();
  document.querySelectorAll('#'+tableId+' tbody tr').forEach(row=>{
    row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

/* ---------------- DELEGACIÓN CENTRAL DE EVENTOS ----------------
   Todo el sistema usa addEventListener (nunca onclick="" inline),
   porque algunos visores/iframes bloquean atributos de evento inline por seguridad. */
document.getElementById('loginBtn').addEventListener('click', attemptLogin);
document.getElementById('logoutBtn').addEventListener('click', logout);
document.getElementById('collapseBtn').addEventListener('click', toggleSidebar);

document.body.addEventListener('click', function(e){
  const el = e.target.closest('[data-action]');
  if(!el) return;
  const action = el.dataset.action;
  const id = el.dataset.id;
  switch(action){
    case 'pick-role': pickRole(el.dataset.user); break;
    case 'navigate': navigate(el.dataset.view); break;
    case 'edit-producto': openProductoModal(id); break;
    case 'new-producto': openProductoModal(); break;
    case 'ajustar-stock': openStockModal(id); break;
    case 'edit-proveedor': openProveedorModal(id); break;
    case 'new-proveedor': openProveedorModal(); break;
    case 'recibir-orden': recibirOrden(id); break;
    case 'new-orden-compra': openOrdenCompraModal(); break;
    case 'add-oc-line': addOCItemLine(); break;
    case 'remove-oc-line': el.closest('.item-line').remove(); updateOCTotal(); break;
    case 'cliente-historial': openClienteHistorial(id); break;
    case 'edit-cliente': openClienteModal(id); break;
    case 'new-cliente': openClienteModal(); break;
    case 'resolver-cot': resolverCotizacion(id, el.dataset.estado); break;
    case 'generar-pedido': generarPedido(id); break;
    case 'new-cotizacion': openCotizacionModal(); break;
    case 'new-venta-directa': openVentaDirectaModal(); break;
    case 'toggle-cliente-rapido': toggleClienteRapido(); break;
    case 'guardar-cliente-rapido': guardarClienteRapido(); break;
    case 'toggle-producto-rapido': toggleProductoRapido(); break;
    case 'guardar-producto-rapido': guardarProductoRapido(); break;
    case 'add-cot-line': addItemLine(); break;
    case 'remove-cot-line': el.closest('.item-line').remove(); updateCotTotal(); break;
    case 'avanzar-pedido': avanzarPedido(id); break;
    case 'liberar-pedido': liberarPedido(id); break;
    case 'liberar-con-credito': ejecutarLiberacion(id, false); break;
    case 'liberar-a-contado': ejecutarLiberacion(id, true); break;
    case 'preparar-pedido': openPreparacionModal(id); break;
    case 'confirmar-preparacion': confirmarPreparacion(id); break;
    case 'despachar-pedido': despacharPedido(id); break;
    case 'marcar-pagada': marcarPagada(id); break;
    case 'close-modal': closeModal(); break;
    case 'inv-tag-filter': invFilters.tag = el.dataset.tag || null; pageState.inventario=1; render(); break;
    case 'eliminar-producto': eliminarRegistro('producto', id); break;
    case 'eliminar-cliente': eliminarRegistro('cliente', id); break;
    case 'eliminar-proveedor': eliminarRegistro('proveedor', id); break;
    case 'new-usuario': openUsuarioModal(); break;
    case 'new-auditoria': openAuditoriaModal(); break;
    case 'edit-usuario': openUsuarioModal(id); break;
    case 'eliminar-usuario': eliminarRegistro('usuario', id); break;
    case 'edit-empresa': openEmpresaModal(); break;
    case 'toggle-pin': {
      const span = el.previousElementSibling;
      if(span.textContent==='••••'){ span.textContent = span.dataset.pin; el.textContent='🙈'; }
      else { span.textContent='••••'; el.textContent='👁'; }
      break;
    }
    case 'restaurar-registro': restaurarRegistro(el.dataset.tipo, id); break;
    case 'ver-lotes': openLotesModal(id); break;
    case 'agregar-lote': agregarLote(id); break;
    case 'eliminar-lote': eliminarLote(id, Number(el.dataset.idx)); break;
    case 'ver-comprobante': openComprobanteModal(id); break;
    case 'confirmar-entrega': openConfirmarEntregaModal(id); break;
    case 'cliente-ausente': marcarClienteAusente(id); break;
    case 'reagendar-entrega': openReagendarModal(id); break;
    case 'agregar-gasto-caja': agregarGastoCaja(); break;
    case 'quitar-gasto-caja': quitarGastoCaja(Number(el.dataset.idx)); break;
    case 'cerrar-caja': cerrarCajaDelDia(); break;
    case 'new-rma': openRMAModal(); break;
    case 'resolver-rma': resolverRMA(id, el.dataset.res); break;
    case 'pdf-cotizacion': generarPDFCotizacion(id); break;
    case 'ver-cotizacion': openCotizacionPreview(id); break;
    case 'ver-pedido': openPedidoPreview(id); break;
    case 'enviar-cotizacion': enviarCotizacionPorCorreo(id); break;
    case 'imprimir-comprobante': window.print(); break;
    case 'page-prev': pageState[el.dataset.view] = Math.max(1, pageState[el.dataset.view]-1); render(); break;
    case 'page-next': pageState[el.dataset.view] = pageState[el.dataset.view]+1; render(); break;
    case 'list-clear': listFilters[el.dataset.view] = {q:'', desde:'', hasta:''}; pageState[el.dataset.view]=1; render(); break;
  }
});

document.body.addEventListener('input', function(e){
  if(e.target.matches('[data-action="inv-search"]')){
    const pos = e.target.selectionStart;
    invFilters.q = e.target.value; pageState.inventario=1;
    render();
    const el2 = document.querySelector('[data-action="inv-search"]');
    if(el2){ el2.focus(); try{ el2.setSelectionRange(pos,pos); }catch(err){} }
    return;
  }
  if(e.target.matches('[data-action="list-search"]')){
    const view = e.target.dataset.view;
    const pos = e.target.selectionStart;
    listFilters[view].q = e.target.value; pageState[view]=1;
    render();
    const el2 = document.querySelector(`[data-action="list-search"][data-view="${view}"]`);
    if(el2){ el2.focus(); try{ el2.setSelectionRange(pos,pos); }catch(err){} }
    return;
  }
  if(e.target.matches('[data-filter]')) filterTable(e.target, e.target.dataset.filter);
  if(e.target.closest('#itemLines')) updateCotTotal();
  if(e.target.id==='f_descuento') updateCotTotal();
  if(e.target.id==='f_caja_inicial'){
    const est = document.getElementById('cajaEstimado');
    if(est){
      const hoyYMD = fechaLocalYMD(nowISO());
      const ventasEfectivoHoy = DB.facturas.filter(f=>f.estado==='Pagada' && f.metodoPago==='Efectivo' && f.fechaPago && fechaLocalYMD(f.fechaPago)===hoyYMD).reduce((s,f)=>s+f.monto,0);
      const gastosTotal = cajaGastosTemp.reduce((s,g)=>s+g.monto,0);
      est.textContent = fmtCLP((Number(e.target.value)||0) + ventasEfectivoHoy - gastosTotal);
    }
  }
  if(e.target.closest('#ocItemLines')) updateOCTotal();
});
document.body.addEventListener('change', function(e){
  if(e.target.matches('[data-action="cot-cliente-change"]')){
    const cliente = DB.clientes.find(x=>x.id===e.target.value);
    const plazoSelect = document.getElementById('f_plazo');
    if(cliente && plazoSelect) plazoSelect.value = diasDesdeCondicionPago(cliente.condicionPago);
    return;
  }
  if(e.target.matches('[data-action="list-desde"]')){ listFilters[e.target.dataset.view].desde = e.target.value; pageState[e.target.dataset.view]=1; render(); return; }
  if(e.target.matches('[data-action="list-hasta"]')){ listFilters[e.target.dataset.view].hasta = e.target.value; pageState[e.target.dataset.view]=1; render(); return; }
  if(e.target.matches('.prep-checkbox')){
    togglePrepItem(e.target.dataset.pedido, Number(e.target.dataset.idx));
    return;
  }
  if(e.target.matches('[data-action="inv-cat-filter"]')){ invFilters.categoria = e.target.value; pageState.inventario=1; render(); return; }
  if(e.target.matches('#itemLines .li-prod')){
    const row = e.target.closest('.item-line');
    row.querySelector('.li-precio').value = e.target.selectedOptions[0].dataset.precio;
    updateCotTotal();
  }
  if(e.target.matches('#ocItemLines .li-prod')){
    const row = e.target.closest('.item-line');
    row.querySelector('.li-precio').value = e.target.selectedOptions[0].dataset.costo;
    updateOCTotal();
  }
});
</script>
