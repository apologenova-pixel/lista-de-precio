<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SISCA · Sistema de Gestión</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<style>
:root{
  --ink:#152420;
  --primary:#0F6E5C;
  --primary-dark:#0B4F42;
  --primary-light:#E3F0EC;
  --navy:#2B4570;
  --bg:#F1F3F1;
  --surface:#FFFFFF;
  --border:#DCE3E0;
  --muted:#5B6B67;
  --danger:#C4432B;
  --danger-light:#FBEAE6;
  --warning:#C98A2C;
  --warning-light:#FBF1E1;
  --success:#2E7D5B;
  --success-light:#E7F3ED;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
  background:var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.display{font-family:'Arial Narrow',Arial,sans-serif;font-weight:700;letter-spacing:.01em;}
.mono{font-family:'Courier New',Courier,monospace;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:#c7d0cd;border-radius:4px;}

/* ---------- LOGIN ---------- */
#loginScreen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(160deg,#0B4F42 0%,#0F6E5C 45%,#123B34 100%);
  padding:20px;
}
.login-card{
  background:var(--surface);border-radius:14px;width:100%;max-width:440px;
  padding:36px 32px 28px;box-shadow:0 30px 60px rgba(11,79,66,.35);
  position:relative;overflow:hidden;
}
.login-pulse{width:100%;height:36px;margin-bottom:18px;}
.login-pulse path{fill:none;stroke:var(--primary);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;
  stroke-dasharray:340;stroke-dashoffset:340;animation:draw 2.6s ease-in-out infinite;}
@keyframes draw{
  0%{stroke-dashoffset:340;opacity:.3;}
  50%{stroke-dashoffset:0;opacity:1;}
  100%{stroke-dashoffset:-340;opacity:.3;}
}
.login-brand{font-size:30px;color:var(--primary-dark);line-height:1;}
.login-sub{color:var(--muted);font-size:13px;margin-top:6px;margin-bottom:26px;}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.role-btn{
  border:1.5px solid var(--border);background:#fff;border-radius:10px;padding:14px 10px;
  text-align:left;transition:.15s;
}
.role-btn:hover{border-color:var(--primary);background:var(--primary-light);}
.role-btn.active{border-color:var(--primary);background:var(--primary-light);box-shadow:0 0 0 3px rgba(15,110,92,.12);}
.role-btn .rn{font-weight:700;font-size:14px;color:var(--ink);display:block;}
.role-btn .rd{font-size:11px;color:var(--muted);}
#pinInput{
  width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;
  font-size:20px;letter-spacing:6px;text-align:center;font-family:'Courier New',Courier,monospace;margin-bottom:12px;
}
#pinInput:focus{outline:none;border-color:var(--primary);}
.login-btn{
  width:100%;background:var(--primary);color:#fff;border:none;padding:13px;border-radius:10px;
  font-weight:600;font-size:14px;transition:.15s;
}
.login-btn:hover{background:var(--primary-dark);}
.login-error{color:var(--danger);font-size:12px;margin-top:8px;min-height:16px;text-align:center;}
.login-hint{font-size:11px;color:#9aa8a4;text-align:center;margin-top:16px;}

/* ---------- APP SHELL ---------- */
#app{display:none;min-height:100vh;}
.shell{display:flex;min-height:100vh;}
.sidebar{
  width:230px;background:var(--ink);color:#fff;display:flex;flex-direction:column;
  flex-shrink:0;transition:width .2s;
}
.sidebar.collapsed{width:64px;}
.side-head{padding:20px 18px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;}
.side-logo{width:30px;height:30px;background:var(--primary);border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-family:'Arial Narrow',Arial,sans-serif;font-weight:700;font-size:14px;}
.side-title{font-family:'Arial Narrow',Arial,sans-serif;font-weight:700;font-size:16px;white-space:nowrap;overflow:hidden;}
.side-title small{display:block;font-family:inherit;font-weight:400;font-size:10px;color:#9fb3ad;}
.sidebar.collapsed .side-title{display:none;}
.nav{flex:1;padding:14px 10px;overflow-y:auto;}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:#c8d4d0;
  font-size:13.5px;font-weight:500;margin-bottom:2px;transition:.12s;white-space:nowrap;overflow:hidden;
}
.nav-item .ic{width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:.9;}
.nav-item .ic svg{width:18px;height:18px;}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff;}
.nav-item.active{background:var(--primary);color:#fff;}
/* Acento de color por rol: para saber de un vistazo en qué modo estás conectado */
.sidebar.role-ventas .side-logo, .sidebar.role-ventas .nav-item.active{background:var(--navy);}
.sidebar.role-bodega .side-logo, .sidebar.role-bodega .nav-item.active{background:var(--warning);}
.sidebar.role-bodega .nav-item.active{color:#2b1c00;}
.sidebar.role-finanzas .side-logo, .sidebar.role-finanzas .nav-item.active{background:#7A4C9E;}
.nav-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:700;}
.sidebar.collapsed .nav-badge, .sidebar.collapsed .nav-item span:not(.ic){display:none;}
.side-foot{padding:14px;border-top:1px solid rgba(255,255,255,.08);}
.side-user{display:flex;align-items:center;gap:8px;font-size:12px;color:#c8d4d0;margin-bottom:8px;}
.side-user b{color:#fff;}
.side-foot button{background:transparent;border:1px solid rgba(255,255,255,.2);color:#c8d4d0;width:100%;
  padding:7px;border-radius:7px;font-size:12px;}
.side-foot button:hover{background:rgba(255,255,255,.08);color:#fff;}
.collapse-btn{background:none;border:none;color:#9fb3ad;font-size:16px;padding:2px 6px;}

.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.topbar{
  background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;
  display:flex;align-items:center;justify-content:space-between;
}
.topbar h1{font-size:19px;}
.topbar .sub{font-size:12px;color:var(--muted);}
.content{padding:24px 28px;overflow-y:auto;}

/* ---------- COMPONENTS ---------- */
.grid-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:22px;}
.grid-cards-2{grid-template-columns:1fr 1fr;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;position:relative;overflow:hidden;padding-left:20px;}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:#DCE3E0;}
.card.alert::before{background:var(--danger);}
.card.warn::before{background:var(--warning);}
.card.ok::before{background:var(--success);}
.card-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;background:#EEF1F0;color:var(--muted);}
.card.alert .card-icon{background:var(--danger-light);color:var(--danger);}
.card.warn .card-icon{background:var(--warning-light);color:var(--warning);}
.card.ok .card-icon{background:var(--success-light);color:var(--success);}
.card-icon svg{width:18px;height:18px;}
.card .label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:600;}
.card .value{font-size:26px;font-weight:700;font-family:'Arial Narrow',Arial,sans-serif;margin-top:4px;}

.panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:20px;overflow:hidden;animation:panelIn .28s ease;}
@keyframes panelIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.card{animation:panelIn .28s ease;}
.panel-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.panel-head h3{font-size:15px;}
.panel-body{padding:0;overflow-x:auto;overflow-y:visible;-webkit-overflow-scrolling:touch;}
.panel-body.pad{padding:16px 18px;overflow-x:visible;}

table{width:100%;border-collapse:collapse;font-size:13px;min-width:560px;}
thead th{
  text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);
  padding:10px 16px;border-bottom:1px solid var(--border);background:#FAFBFA;font-weight:600;
  position:sticky;top:0;z-index:5;
}
tbody td{padding:11px 16px;border-bottom:1px solid #EEF1F0;vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:nth-child(even){background:#FAFBFA;}
tbody tr:hover{background:var(--primary-light);}
.empty-row td{text-align:center;color:var(--muted);padding:30px;font-size:13px;}
.empty-state{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 20px;}
.empty-state svg{width:38px;height:38px;opacity:.3;margin-bottom:4px;}
.empty-state .es-title{font-size:13.5px;font-weight:600;color:var(--ink);}
.empty-state .es-sub{font-size:12px;color:var(--muted);max-width:320px;}

.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}
.badge.gray{background:#EEF1F0;color:var(--muted);}
.badge.green{background:var(--success-light);color:var(--success);}
.badge.amber{background:var(--warning-light);color:var(--warning);}
.badge.red{background:var(--danger-light);color:var(--danger);}
.badge.blue{background:#E7EDF6;color:var(--navy);}
.badge.teal{background:var(--primary-light);color:var(--primary-dark);}

.tag-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:4px 10px;
  border-radius:20px;border:1.5px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;transition:.12s;}
.tag-chip:hover{border-color:var(--primary);color:var(--primary);}
.tag-chip.active{background:var(--primary);border-color:var(--primary);color:#fff;}
.tag-bar{display:flex;flex-wrap:wrap;gap:6px;padding:12px 18px;border-bottom:1px solid var(--border);background:#FAFBFA;}
.cat-select{border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:12.5px;}
.tag-mini{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;
  background:var(--primary-light);color:var(--primary-dark);margin:2px 3px 0 0;}

/* Stepper de progreso del ciclo de venta */
.stepper{display:flex;align-items:center;flex-wrap:wrap;gap:2px;font-size:10.5px;}
.step{padding:3px 8px;border-radius:12px;font-weight:600;white-space:nowrap;background:#EEF1F0;color:var(--muted);}
.step-done{background:var(--success-light);color:var(--success);}
.step-pending{background:#EEF1F0;color:#a7b2ae;}
.step-rejected{background:var(--danger-light);color:var(--danger);}
.step-arrow{color:#c7d0cd;font-size:12px;}

/* Panel de acciones pendientes (dashboard) */
.action-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 18px;border-bottom:1px solid #EEF1F0;}
.action-row:last-child{border-bottom:none;}
.action-row .desc{font-size:13px;}
.action-row .desc b{display:block;font-size:13.5px;}
.action-row .desc small{color:var(--muted);font-size:11.5px;}
.action-row .act{flex-shrink:0;display:flex;gap:6px;}
.empty-actions{text-align:center;color:var(--muted);padding:30px;font-size:13px;}

.btn{border:none;border-radius:8px;padding:8px 14px;font-size:12.5px;font-weight:600;transition:.12s;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-dark);}
.btn-ghost{background:#fff;border:1px solid var(--border);color:var(--ink);}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary);}
.btn-danger{background:var(--danger-light);color:var(--danger);}
.btn-danger:hover{background:var(--danger);color:#fff;}
.btn-sm{padding:5px 10px;font-size:11.5px;border-radius:6px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}

.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.search-box{
  border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;min-width:220px;
}
.search-box:focus{outline:none;border-color:var(--primary);}

/* Pulse stock gauge - signature element */
.pulse-wrap{display:flex;align-items:center;gap:8px;}
.pulse-svg{width:64px;height:22px;flex-shrink:0;}
.pulse-svg path{fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;
  stroke-dasharray:120;stroke-dashoffset:120;animation:pulseDraw 2.4s ease-in-out infinite;}
@keyframes pulseDraw{
  0%{stroke-dashoffset:120;}
  60%{stroke-dashoffset:0;}
  100%{stroke-dashoffset:-120;}
}
.pulse-num{font-family:'Courier New',Courier,monospace;font-size:12.5px;font-weight:600;}

/* Modal */
.overlay{
  display:none;position:fixed;inset:0;background:rgba(21,36,32,.45);
  align-items:center;justify-content:center;z-index:100;padding:20px;
}
.overlay.show{display:flex;animation:overlayIn .15s ease;}
@keyframes overlayIn{from{opacity:0;}to{opacity:1;}}
.modal{background:#fff;border-radius:14px;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.25);animation:modalIn .2s cubic-bezier(.2,.8,.3,1);}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(6px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-head h3{font-size:16px;}
.modal-close{background:none;border:none;font-size:20px;color:var(--muted);line-height:1;}
.modal-body{padding:20px 22px;}
.modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}

.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;}
.field input,.field select,.field textarea{
  width:100%;border:1.5px solid var(--border);border-radius:8px;padding:9px 11px;font-size:13.5px;
}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--primary);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

.item-line{display:grid;grid-template-columns:2.2fr 0.8fr 0.9fr 0.9fr auto;gap:8px;margin-bottom:8px;align-items:center;}
.item-line select,.item-line input{padding:7px 9px;font-size:12.5px;border:1.5px solid var(--border);border-radius:7px;}
.remove-line{background:none;border:none;color:var(--danger);font-size:16px;}

.toast-host{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--ink);color:#fff;padding:11px 16px;border-radius:9px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.2);
  animation:toastIn .2s ease;}
@keyframes toastIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

.locked-note{background:var(--warning-light);border:1px solid var(--warning);color:#8a5c17;padding:10px 14px;
  border-radius:8px;font-size:12.5px;margin-bottom:16px;}
.hidden-cost{color:#b6bfbc;font-style:italic;}

@media(max-width:900px){
  .sidebar{position:fixed;z-index:50;height:100vh;left:0;top:0;transform:translateX(-100%);transition:transform .2s;}
  .sidebar.mobile-open{transform:translateX(0);}
  .sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:45;}
  .sidebar-backdrop.show{display:block;}
  .content{padding:16px;}
  .topbar{padding:12px 16px;}
}
@media(max-width:640px){
  .grid-cards{grid-template-columns:1fr 1fr;gap:10px;}
  .grid-cards-2{grid-template-columns:1fr;}
  .card{padding:14px;}
  .card .value{font-size:21px;}
  .field-row{grid-template-columns:1fr;gap:0;}
  .item-line{grid-template-columns:1fr;gap:6px;background:#FAFBFA;border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:10px;}
  .item-line .remove-line{justify-self:end;}
  .overlay{padding:0;align-items:stretch;}
  .modal{max-width:100%;width:100%;height:100%;max-height:100%;border-radius:0;display:flex;flex-direction:column;}
  .modal-head{flex-shrink:0;}
  .modal-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .modal-foot{flex-shrink:0;padding-bottom:max(14px, env(safe-area-inset-bottom));}
  .toolbar{width:100%;}
  .search-box{min-width:0;flex:1;}
  .topbar .sub{display:none;}
  .toast-host{left:12px;right:12px;bottom:12px;}
  .toast{width:100%;}
}
@media(max-width:420px){
  .grid-cards{grid-template-columns:1fr;}
}
@media print{
  body *{visibility:hidden;}
  #comprobanteArea, #comprobanteArea *{visibility:visible;}
  #comprobanteArea{position:absolute;top:0;left:0;width:100%;}
  .no-print{display:none !important;}
}
@media(prefers-reduced-motion:reduce){
  *{animation-duration:0.001s !important;animation-iteration-count:1 !important;transition-duration:0.001s !important;}
}
</style>
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<div id="loginScreen">
  <div class="login-card">
    <svg class="login-pulse" viewBox="0 0 340 36"><path d="M0,18 L60,18 L72,4 L84,32 L96,18 L340,18"/></svg>
    <div class="login-brand display" id="loginBrand">SISCA</div>
    <div class="login-sub" id="loginSub">Insumos médicos descartables · Sistema de gestión operativa</div>

    <div class="role-grid" id="roleGrid"></div>

    <input type="password" id="pinInput" maxlength="4" placeholder="••••" inputmode="numeric">
    <button class="login-btn" id="loginBtn">Ingresar</button>
    <div class="login-error" id="loginError"></div>
    <div class="login-hint">Selecciona tu usuario e ingresa tu PIN. Un Administrador puede crear o editar usuarios desde el panel "Usuarios".</div>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="app">
  <div class="shell">
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
    <div class="sidebar" id="sidebar">
      <div class="side-head">
        <div class="side-logo display" id="sideLogo">S</div>
        <div class="side-title" id="sideTitle">SISCA<small id="sideTitleSmall">Insumos médicos</small></div>
      </div>
      <div class="nav" id="navList"></div>
      <div class="side-foot">
        <div class="side-user">👤 <b id="sideUserRole">—</b></div>
        <button id="logoutBtn">Cerrar sesión</button>
      </div>
    </div>

    <div class="main">
      <div class="topbar">
        <div>
          <button class="collapse-btn" id="collapseBtn">☰</button>
          <span id="topbarTitle" style="font-family:'Arial Narrow',Arial,sans-serif;font-weight:700;font-size:16px;margin-left:6px;">Dashboard</span>
        </div>
        <div class="sub" id="topbarSub"></div>
        <div id="syncStatus" style="font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;margin-top:2px;"></div>
      </div>
      <div class="content" id="content"></div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modalBox"></div>
</div>

<div class="toast-host" id="toastHost"></div>
<div id="fatalError" style="display:none;position:fixed;top:0;left:0;right:0;background:#C4432B;color:#fff;
  padding:14px 20px;font-family:sans-serif;font-size:13px;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.3);">
  <b>⚠ Error en la aplicación:</b> <span id="fatalErrorMsg"></span>
  <button id="fatalErrorClose" style="float:right;background:none;border:1px solid #fff;color:#fff;border-radius:4px;padding:2px 8px;">Cerrar</button>
</div>

<script>
/* =========================================================
   SISCA — Sistema de Gestión de Distribuidora
   Insumos médicos descartables · localStorage, sin backend
   ========================================================= */

/* Captura cualquier error de JS y lo muestra en pantalla, para que
   nunca se vea "no pasa nada" sin explicación. */
window.addEventListener('error', function(e){
  const box = document.getElementById('fatalError');
  const msg = document.getElementById('fatalErrorMsg');
  if(box && msg){ msg.textContent = e.message + ' (línea ' + e.lineno + ')'; box.style.display='block'; }
});
window.addEventListener('unhandledrejection', function(e){
  const box = document.getElementById('fatalError');
  const msg = document.getElementById('fatalErrorMsg');
  if(box && msg){ msg.textContent = 'Promesa rechazada: ' + e.reason; box.style.display='block'; }
});
document.getElementById('fatalErrorClose').addEventListener('click', function(){
  document.getElementById('fatalError').style.display='none';

function parseFechaFlexible(d){
  if(typeof d==='string' && /^\d{4}-\d{2}-\d{2}$/.test(d)){
    const [y,m,day] = d.split('-').map(Number);
    return new Date(y, m-1, day); // fecha-only: medianoche en hora LOCAL, no UTC
  }
  return new Date(d);
}
function fechaLocalYMD(fechaISO){
  const d = new Date(fechaISO);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function dentroDeRango(fechaISO, desde, hasta){
  const ymd = fechaLocalYMD(fechaISO);
  if(desde && ymd < desde) return false;   // el día completo "desde" (00:00) queda incluido
  if(hasta && ymd > hasta) return false;   // el día completo "hasta" (23:59) queda incluido
  return true;
}

function paginar(array, view){

  if(pageState[view] > totalPaginas) pageState[view] = totalPaginas;
  if(pageState[view] < 1) pageState[view] = 1;

  return { pagina: array.slice(start, start+PAGE_SIZE), totalPaginas, paginaActual: pageState[view], totalItems: array.length };
}

let FIREBASE_OK = false;
let firestoreDB = null;
let ultimaEscrituraLocal = 0; // evita procesar el "eco" de nuestra propia escritura como si fuera remota
let nubeConectada = false;

function actualizarIndicadorSync(estado){
  const el = document.getElementById('syncStatus');
  if(!el) return;
  if(estado==='ok') el.innerHTML = '🟢 Sincronizado con la nube';
  else if(estado==='conectando') el.innerHTML = '🟡 Conectando…';
  else if(estado==='error') el.innerHTML = '🔴 Sin conexión a la nube — trabajando localmente';
  else el.innerHTML = '';
}

function iniciarFirebase(){
  if(typeof firebase==='undefined'){ actualizarIndicadorSync('error'); return; }
  try{
    actualizarIndicadorSync('conectando');
    firebase.initializeApp(firebaseConfig);
    firestoreDB = firebase.firestore();
    firebase.auth().signInAnonymously().then(()=>{
      FIREBASE_OK = true;
      escucharCambiosRemotos();
    }).catch(err=>{
      console.error('Firebase auth error', err);
      actualizarIndicadorSync('error');
    });
  }catch(e){
    console.error('Firebase init error', e);
    actualizarIndicadorSync('error');
  }
}
function escucharCambiosRemotos(){
  const ref = firestoreDB.collection('sisca').doc('data');
  ref.get().then(snap=>{
    if(!snap.exists){
      // Primera vez: no hay datos en la nube todavía, subimos lo que tengamos localmente
      ref.set(DB).then(()=>{ nubeConectada=true; actualizarIndicadorSync('ok'); });
    } else {
      nubeConectada = true;
      actualizarIndicadorSync('ok');
    }
  });
  ref.onSnapshot(snap=>{
    if(!snap.exists) return;
    // Si la escritura vino de este mismo dispositivo hace menos de 2s, la ignoramos (ya la tenemos aplicada)
    if(Date.now() - ultimaEscrituraLocal < 2000) return;
    const remoto = snap.data();
    DB = migrarDB(remoto);
    try{ localStorage.setItem(DB_KEY, JSON.stringify(DB)); }catch(e){}
    actualizarIndicadorSync('ok');
    if(session){ buildRoleGrid(); render(); }
    else { buildRoleGrid(); aplicarMarcaEmpresa(); }
  }, err=>{
    console.error('Firestore listener error', err);
    actualizarIndicadorSync('error');
  });
}
function guardarEnLaNube(){
  if(!FIREBASE_OK || !firestoreDB) return;
  ultimaEscrituraLocal = Date.now();
  firestoreDB.collection('sisca').doc('data').set(DB).then(()=>{
    actualizarIndicadorSync('ok');
  }).catch(err=>{
    console.error('Firestore write error', err);
    actualizarIndicadorSync('error');
    toast('⚠ No se pudo sincronizar con la nube. Tus cambios quedaron guardados localmente.');
  });
}

let currentView = 'dashboard';
function isMobileView(){ return window.innerWidth <= 900; }
function toggleSidebar(){
  const sb = document.getElementById('sidebar');
  const bd = document.getElementById('sidebarBackdrop');
  if(isMobileView()){
    sb.classList.toggle('mobile-open');
    bd.classList.toggle('show', sb.classList.contains('mobile-open'));
  } else {
    sb.classList.toggle('collapsed');
  }
}
function closeMobileSidebar(){
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('sidebarBackdrop').classList.remove('show');
}
document.getElementById('sidebarBackdrop').addEventListener('click', closeMobileSidebar);

function aplicarMarcaEmpresa(){
  const nombre = (DB.empresa && DB.empresa.nombre) || 'SISCA';
  const giro = (DB.empresa && DB.empresa.giro) || 'Sistema de gestión operativa';
  const loginBrand = document.getElementById('loginBrand');
  const loginSub = document.getElementById('loginSub');
  if(loginBrand) loginBrand.textContent = nombre;
  if(loginSub) loginSub.textContent = giro ? giro+' · Sistema de gestión operativa' : 'Sistema de gestión operativa';
  const sideLogo = document.getElementById('sideLogo');
  const sideTitle = document.getElementById('sideTitle');
  const sideTitleSmall = document.getElementById('sideTitleSmall');
  if(sideLogo) sideLogo.textContent = nombre.charAt(0).toUpperCase();
  if(sideTitle && sideTitleSmall){
    sideTitle.childNodes[0].textContent = nombre;
    sideTitleSmall.textContent = giro || 'Sistema de gestión';
  }
}
function aplicarAcentoRol(){
  const sb = document.getElementById('sidebar');
  if(!sb) return;
  sb.classList.remove('role-admin','role-ventas','role-bodega','role-finanzas');
  sb.classList.add('role-'+session.role);
}
function initApp(){
  document.getElementById('sideUserRole').textContent = session.nombre + ' · ' + ROLES[session.role].label;
  aplicarMarcaEmpresa();
  aplicarAcentoRol();
  buildNav();
  navigate('dashboard');
}
function buildNav(){
  const mods = ROLES[session.role].modules;
  const nav = document.getElementById('navList');
  nav.innerHTML = mods.map(m=>{
    const d = NAV_DEFS[m];
    let badge='';
    if(m==='dashboard'){ const n=alertCount(); if(n>0) badge=`<span class="nav-badge">${n}</span>`; }
    return `<div class="nav-item" data-view="${m}" data-action="navigate"><span class="ic">${ICONS[m]}</span><span>${d.label}</span>${badge}</div>`;
  }).join('');
  updateNavActive();
}
function updateNavActive(){
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active', el.dataset.view===currentView));
}
function alertCount(){
  let n=0;
  n += DB.productos.filter(p=>p.stock<=p.stockMin).length;
  n += DB.cotizaciones.filter(c=>c.estado==='Pendiente' && hoursSince(c.fecha)>48).length;
  n += DB.facturas.filter(f=>f.estado!=='Pagada' && daysUntil(f.vencimiento)<0).length;
  return n;
}
function navigate(view){
  if(!ROLES[session.role].modules.includes(view)) return;
  currentView = view;
  document.getElementById('topbarTitle').textContent = NAV_DEFS[view].label;
  updateNavActive();
  render();
  if(isMobileView()) closeMobileSidebar();
}
function hasAccess(mod){ return ROLES[session.role].modules.includes(mod); }
function canSeeCosts(){ return session.role==='admin' || session.role==='finanzas'; }
function canSeePrecio(){ return session.role!=='bodega'; }
function isAdmin(){ return session.role==='admin'; }
function proveedorNombre(id){ const p=DB.proveedores.find(x=>x.id===id); return p?p.nombre:'—'; }
function logMovimiento(tipo, productoId, cantidad, detalle){
  DB.movimientos.push({id:'MOV-'+String(DB.seq.mov++), tipo, productoId, cantidad, detalle, usuario:ROLES[session.role].label, fecha:nowISO()});
  saveDB();
}

/* ---------------- PAPELERA (eliminación segura con restauración) ---------------- */
const PAPELERA_TIPOS = {
  producto:{coleccion:'productos', label:'Producto', nombreFn:p=>p.nombre},
  cliente:{coleccion:'clientes', label:'Cliente', nombreFn:c=>c.nombre},
  proveedor:{coleccion:'proveedores', label:'Proveedor', nombreFn:p=>p.nombre},
  usuario:{coleccion:'usuarios', label:'Usuario', nombreFn:u=>u.nombre},
};
function eliminarRegistro(tipo, id){
  const cfg = PAPELERA_TIPOS[tipo];
  const item = DB[cfg.coleccion].find(x=>x.id===id);
  if(!item) return;
  if(tipo==='usuario' && id===session.userId){ toast('No puedes eliminar tu propio usuario mientras estás conectado.'); return; }
  showConfirm(`¿Eliminar "${cfg.nombreFn(item)}"?`, 'Podrás restaurarlo después desde la Papelera si te equivocas.', ()=>{
    item.eliminado = true; item.eliminadoFecha = nowISO(); item.eliminadoTipo = tipo;
    saveDB(); closeModal(); render();
    if(tipo==='usuario') buildRoleGrid();
    toast(cfg.label+' movido a la papelera.');
  });
}
function restaurarRegistro(tipo, id){
  const cfg = PAPELERA_TIPOS[tipo];
  const item = DB[cfg.coleccion].find(x=>x.id===id);
  if(!item) return;
  item.eliminado = false; delete item.eliminadoFecha;
  saveDB(); render();
  if(tipo==='usuario') buildRoleGrid();
  toast(cfg.label+' restaurado.');
}
/* ---------------- USUARIOS Y ROLES ---------------- */

      <td>${u.id===session.userId?'<span style="font-size:11px;color:var(--muted);">(tú)</span>':''}
        <button class="btn btn-ghost btn-sm" data-action="edit-usuario" data-id="${u.id}">Editar</button>
        ${u.id!==session.userId?`<button class="btn btn-danger btn-sm" data-action="eliminar-usuario" data-id="${u.id}">Eliminar</button>`:''}

    </table></div>
  </div>
  <div class="panel"><div class="panel-head"><h3>Permisos por rol</h3></div><div class="panel-body pad">
    ${Object.entries(ROLES).map(([key,r])=>`
      <div style="margin-bottom:12px;">
        <b style="font-size:13px;">${r.label}</b><br>
        <span style="font-size:12px;color:var(--muted);">${r.modules.map(m=>NAV_DEFS[m].label).join(' · ')}</span>
      </div>`).join('')}
  </div></div>
  <div class="panel"><div class="panel-head"><h3>Datos de la empresa</h3>
    <button class="btn btn-primary btn-sm" data-action="edit-empresa">Editar</button>
  </div><div class="panel-body pad">
    <div style="font-size:13px;line-height:1.9;">
      <b>${DB.empresa.nombre || '—'}</b>${DB.empresa.giro?' · '+DB.empresa.giro:''}<br>
      ${DB.empresa.rut?'RUT: '+DB.empresa.rut+'<br>':''}
      ${DB.empresa.direccion?DB.empresa.direccion+'<br>':''}
      ${DB.empresa.telefono?'Tel: '+DB.empresa.telefono+' · ':''}${DB.empresa.email||''}
      ${DB.empresa.sitioWeb?'<br>'+DB.empresa.sitioWeb:''}
      ${(!DB.empresa.rut && !DB.empresa.direccion && !DB.empresa.telefono && !DB.empresa.email)?'<span style="color:var(--muted);">Aún no has completado los datos de tu empresa. Estos aparecerán en las cotizaciones y comprobantes que generes.</span>':''}
    </div>
  </div></div>`;
}
function openUsuarioModal(id){
  const u = id ? DB.usuarios.find(x=>x.id===id) : null;
  showModal(`${u?'Editar':'Nuevo'} usuario`, `
    <div class="field"><label>Nombre completo</label><input id="f_nombre" value="${u?u.nombre:''}" placeholder="ej: María Fernández"></div>
    <div class="field-row">
      <div class="field"><label>Rol</label><select id="f_rol">${Object.entries(ROLES).map(([key,r])=>`<option value="${key}" ${u&&u.rol===key?'selected':''}>${r.label}</option>`).join('')}</select></div>
      <div class="field"><label>PIN (4 dígitos)</label><input id="f_pin" maxlength="4" inputmode="numeric" value="${u?u.pin:''}" placeholder="1234"></div>
    </div>
    <div class="field"><label style="display:flex;align-items:center;gap:8px;font-weight:600;">
      <input type="checkbox" id="f_activo" ${!u || u.activo?'checked':''} style="width:16px;height:16px;"> Usuario activo (puede iniciar sesión)
    </label></div>
  `, ()=>{
    const nombre = val('f_nombre'); const pin = val('f_pin'); const rol = val('f_rol');
    if(!nombre){ toast('El nombre es obligatorio.'); return; }
    if(!/^\d{4}$/.test(pin)){ toast('El PIN debe tener exactamente 4 dígitos.'); return; }
    const duplicado = DB.usuarios.find(x=>!x.eliminado && x.pin===pin && x.id!==(u?u.id:null));
    if(duplicado){ toast('Ese PIN ya está en uso por '+duplicado.nombre+'. Elige otro.'); return; }
    const activo = document.getElementById('f_activo').checked;
    const data = {nombre, rol, pin, activo};
    if(u){ Object.assign(u,data); }
    else { data.id = 'U-'+String(DB.seq.usr++); DB.usuarios.push(data); }
    saveDB(); closeModal(); render(); buildRoleGrid();
    toast('Usuario guardado correctamente.');
  });
}

/* ---------------- CIERRE DE CAJA DIARIO (Proceso 2.4 del manual) ---------------- */
let cajaGastosTemp = [];
function renderCaja(){
  const hoyYMD = fechaLocalYMD(nowISO());
  const cierreHoy = DB.caja.find(c=>c.fecha===hoyYMD);
  const ventasEfectivoHoy = DB.facturas.filter(f=>f.estado==='Pagada' && f.metodoPago==='Efectivo' && f.fechaPago && fechaLocalYMD(f.fechaPago)===hoyYMD)
    .reduce((s,f)=>s+f.monto,0);
  const historial = DB.caja.slice().reverse();

  if(cierreHoy && cierreHoy.cerrado){
    return `<div class="panel"><div class="panel-head"><h3>Caja del día — ${fmtDate(hoyYMD)}</h3></div>
      <div class="panel-body pad">
        <div class="locked-note">✓ La caja de hoy ya fue cerrada.</div>
        <div style="margin-top:12px;line-height:2;">
          Efectivo inicial: <b>${fmtCLP(cierreHoy.efectivoInicial)}</b><br>
          Ventas en efectivo: <b>${fmtCLP(cierreHoy.ventasEfectivo)}</b><br>
          Gastos rendidos: <b>-${fmtCLP(cierreHoy.gastos.reduce((s,g)=>s+g.monto,0))}</b><br>
          <span style="font-size:16px;">Efectivo real: <b>${fmtCLP(cierreHoy.efectivoReal)}</b></span>
        </div>
      </div></div>
      ${renderHistorialCaja(historial)}`;
  }

  const gastosTotal = cajaGastosTemp.reduce((s,g)=>s+g.monto,0);
  const inputPrevio = document.getElementById('f_caja_inicial');
  const efectivoInicialActual = inputPrevio ? (Number(inputPrevio.value)||0) : (cierreHoy?cierreHoy.efectivoInicial:0);
  return `<div class="panel"><div class="panel-head"><h3>Cierre de Caja Diario — ${fmtDate(hoyYMD)}</h3></div>
    <div class="panel-body pad">
      <div class="field"><label>Efectivo inicial del día</label><input id="f_caja_inicial" type="number" min="0" value="${efectivoInicialActual}"></div>
      <div class="field"><label>Ventas en efectivo de hoy (automático)</label>
        <input value="${fmtCLP(ventasEfectivoHoy)}" disabled style="background:#F4F6F5;"></div>
      <div class="field"><label>Gastos rendidos y autorizados</label>
        <div id="cajaGastosList" style="margin-bottom:8px;">${cajaGastosTemp.map((g,i)=>`
          <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:#FAFBFA;border:1px solid var(--border);border-radius:6px;margin-bottom:5px;font-size:12.5px;">
            <span>${g.descripcion}</span><span class="mono">${fmtCLP(g.monto)} <button class="btn btn-ghost btn-sm" data-action="quitar-gasto-caja" data-idx="${i}" style="padding:2px 6px;margin-left:6px;">✕</button></span>
          </div>`).join('')}</div>
        <div class="field-row">
          <input id="f_gasto_desc" placeholder="Descripción del gasto">
          <input id="f_gasto_monto" type="number" placeholder="Monto">
        </div>
        <button class="btn btn-ghost btn-sm" data-action="agregar-gasto-caja" style="margin-top:6px;">+ Agregar gasto</button>
      </div>
      <div class="locked-note" style="margin-top:14px;">
        Efectivo Real = Efectivo Inicial + Ventas en Efectivo − Gastos Rendidos<br>
        <b style="font-size:15px;">Efectivo Real estimado: <span id="cajaEstimado" class="mono">${fmtCLP(efectivoInicialActual + ventasEfectivoHoy - gastosTotal)}</span></b>
      </div>
    </div>
    <div class="modal-foot" style="border-top:1px solid var(--border);">
      <button class="btn btn-primary" data-action="cerrar-caja">🔒 Cerrar caja del día</button>
    </div>
  </div>
  ${renderHistorialCaja(historial)}`;
}
function renderHistorialCaja(historial){
  if(!historial.length) return '';
  return `<div class="panel"><div class="panel-head"><h3>Historial de cierres</h3></div><div class="panel-body">
    <table><thead><tr><th>Fecha</th><th>Efectivo inicial</th><th>Ventas efectivo</th><th>Gastos</th><th>Efectivo real</th></tr></thead>
    <tbody>${historial.map(c=>`<tr><td>${fmtDate(c.fecha)}</td><td class="mono">${fmtCLP(c.efectivoInicial)}</td><td class="mono">${fmtCLP(c.ventasEfectivo)}</td>
    <td class="mono">-${fmtCLP(c.gastos.reduce((s,g)=>s+g.monto,0))}</td><td class="mono"><b>${fmtCLP(c.efectivoReal)}</b></td></tr>`).join('')}</tbody></table>
  </div></div>`;
}
function agregarGastoCaja(){
  const desc = val('f_gasto_desc'); const monto = Number(val('f_gasto_monto'))||0;
  if(!desc || monto<=0){ toast('Completa descripción y monto del gasto.'); return; }
  cajaGastosTemp.push({descripcion:desc, monto});
  render();
}
function quitarGastoCaja(idx){ cajaGastosTemp.splice(idx,1); render(); }
function cerrarCajaDelDia(){
  const hoyYMD = fechaLocalYMD(nowISO());
  const efectivoInicial = Number(document.getElementById('f_caja_inicial').value)||0;
  const ventasEfectivoHoy = DB.facturas.filter(f=>f.estado==='Pagada' && f.metodoPago==='Efectivo' && f.fechaPago && fechaLocalYMD(f.fechaPago)===hoyYMD)
    .reduce((s,f)=>s+f.monto,0);
  const gastosTotal = cajaGastosTemp.reduce((s,g)=>s+g.monto,0);
  const efectivoReal = efectivoInicial + ventasEfectivoHoy - gastosTotal;
  showConfirm('¿Cerrar caja del día?', 'Efectivo real final: '+fmtCLP(efectivoReal)+'. Una vez cerrada, no podrás editar este cierre.', ()=>{
    DB.caja.push({id:'CAJA-'+String(DB.seq.caja++), fecha:hoyYMD, efectivoInicial, ventasEfectivo:ventasEfectivoHoy, gastos:cajaGastosTemp.slice(), efectivoReal, cerrado:true});
    cajaGastosTemp = [];
    saveDB(); closeModal(); render();
    toast('Caja del día cerrada. Efectivo real: '+fmtCLP(efectivoReal)+'.');
  }, {confirmLabel:'Sí, cerrar caja', danger:false});
}

/* ---------------- POSTVENTA Y RMA (Proceso 5.1 del manual) ---------------- */
function renderRMA(){
  const items = DB.rma.slice().reverse();
  const rows = items.map(r=>`<tr>
    <td class="mono">${r.id}</td><td>${clienteNombre(r.clienteId)}</td><td>${r.productoNombre}</td>
    <td style="max-width:220px;font-size:12px;">${r.descripcionFalla}</td><td>${fmtDate(r.fecha)}</td>
    <td>${badgeRMA(r.estado)}</td>
    <td>${r.estado==='En cuarentena'?`
      <button class="btn btn-primary btn-sm" data-action="resolver-rma" data-id="${r.id}" data-res="Cambio">Autorizar cambio</button>
      <button class="btn btn-ghost btn-sm" data-action="resolver-rma" data-id="${r.id}" data-res="Nota de crédito">Nota de crédito</button>`:
      `<span style="font-size:11px;color:var(--muted);">Resuelto ${r.resolucionFecha?fmtDate(r.resolucionFecha):''}</span>`}</td>
  </tr>`).join('');
  return `<div class="panel"><div class="panel-head"><h3>Postventa · Garantías y Devoluciones</h3>
    <div class="toolbar"><button class="btn btn-primary" data-action="new-rma">+ Registrar garantía</button></div>
  </div><div class="panel-body">
    <table><thead><tr><th>N°</th><th>Cliente</th><th>Producto</th><th>Falla reportada</th><th>Fecha</th><th>Estado</th><th></th></tr></thead>
    <tbody>${rows || `<tr class="empty-row"><td colspan="7">${emptyState('rma','Sin garantías registradas','Cuando un cliente reporte una falla, regístrala aquí para seguimiento.')}</td></tr>`}</tbody></table>
  </div></div>`;
}
function badgeRMA(e){
  if(e==='En cuarentena') return '<span class="badge amber">En cuarentena</span>';
  if(e==='Cambio') return '<span class="badge blue">Resuelto: cambio</span>';
  return '<span class="badge green">Resuelto: N. crédito</span>';
}
function openRMAModal(){
  const clientesActivos = DB.clientes.filter(c=>!c.eliminado);
  showModal('Registrar garantía / devolución', `
    <div class="field"><label>Cliente</label><select id="f_rma_cliente">${clientesActivos.map(c=>`<option value="${c.id}">${c.nombre}</option>`).join('')}</select></div>
    <div class="field"><label>Producto</label><select id="f_rma_producto">${DB.productos.filter(p=>!p.eliminado).map(p=>`<option value="${p.id}">${p.nombre}</option>`).join('')}</select></div>
    <div class="field"><label>Factura de compra (opcional)</label><input id="f_rma_factura" placeholder="N° de factura"></div>
    <div class="field"><label>Descripción de la falla reportada</label><textarea id="f_rma_falla" rows="3" placeholder="Describe el problema técnico reportado por el cliente"></textarea></div>
    <div class="locked-note">El producto se considera en "Zona de Cuarentena" hasta que se determine si la falla es de fábrica.</div>
  `, ()=>{
    const clienteId = val('f_rma_cliente'); const productoId = val('f_rma_producto'); const falla = val('f_rma_falla');
    if(!falla){ toast('Describe la falla reportada.'); return; }
    const prod = DB.productos.find(p=>p.id===productoId);
    DB.rma.push({id:'RMA-'+String(DB.seq.rma++), clienteId, productoId, productoNombre:prod?prod.nombre:'—',
      facturaRef:val('f_rma_factura'), descripcionFalla:falla, estado:'En cuarentena', fecha:nowISO()});
    saveDB(); closeModal(); render();
    toast('Garantía registrada y producto en cuarentena.');
  });
}
function resolverRMA(id, resolucion){
  const r = DB.rma.find(x=>x.id===id);
  showConfirm('¿Confirmar resolución?', 'Se marcará como "'+resolucion+'" y saldrá de cuarentena.', ()=>{
    r.estado = resolucion; r.resolucionFecha = nowISO();
    saveDB(); closeModal(); render();
    toast('Garantía '+id+' resuelta: '+resolucion+'.');
  }, {confirmLabel:'Sí, confirmar', danger:false});
}

/* ---------------- AUDITORÍA CÍCLICA DE INVENTARIO (KPI: Exactitud de inventario) ---------------- */
function openAuditoriaModal(){
  const productos = DB.productos.filter(p=>!p.eliminado);
  showModal('Auditoría cíclica de inventario', `
    <div class="locked-note">Cuenta físicamente cada producto y anota lo encontrado. Al guardar, el sistema calculará el % de exactitud y ajustará el stock según lo contado.</div>
    <table><thead><tr><th>Producto</th><th>Stock sistema</th><th>Conteo físico</th></tr></thead>
    <tbody>${productos.map(p=>`<tr><td>${p.nombre}</td><td class="mono">${p.stock}</td>
      <td><input type="number" min="0" class="audit-count" data-id="${p.id}" placeholder="${p.stock}" style="width:90px;padding:6px 8px;border:1.5px solid var(--border);border-radius:6px;"></td></tr>`).join('')}</tbody></table>
  `, ()=>{
    const inputs = document.querySelectorAll('.audit-count');
    let coincidencias = 0, total = 0, ajustes = [];
    inputs.forEach(inp=>{
      const val = inp.value.trim();
      if(val===''){ return; } // no contado, se omite del cálculo
      total++;
      const prod = DB.productos.find(p=>p.id===inp.dataset.id);
      const contado = Number(val);
      if(contado===prod.stock){ coincidencias++; }
      else{
        const diff = contado - prod.stock;
        logMovimiento(diff>0?'entrada':'salida', prod.id, Math.abs(diff), 'Ajuste por auditoría cíclica');
        prod.stock = contado;
        ajustes.push(prod.nombre);
      }
    });
    if(total===0){ toast('No ingresaste ningún conteo físico.'); return; }
    const exactitud = Math.round(100*coincidencias/total);
    DB.auditorias = DB.auditorias||[];
    DB.auditorias.push({id:'AUD-'+Date.now(), fecha:nowISO(), exactitud, productosContados:total, productosAjustados:ajustes.length});
    saveDB(); closeModal(); render();
    toast('Auditoría completada: '+exactitud+'% de exactitud. '+(ajustes.length?ajustes.length+' producto(s) ajustado(s).':'Sin diferencias.'));
  });
}

function stockDisponible(p){ return Math.max(0, p.stock - (p.stockReservado||0)); }

/* ---------------- RIESGO CREDITICIO (Proceso 1.2 / 2.1 del manual) ---------------- */
function evaluarRiesgoCredito(clienteId){
  const motivos = [];
  const facturasVencidas = DB.facturas.filter(f=>f.clienteId===clienteId && f.estado!=='Pagada' && daysUntil(f.vencimiento)<0);
  if(facturasVencidas.length){
    motivos.push('Tiene '+facturasVencidas.length+' factura(s) vencida(s) sin pagar ('+fmtCLP(facturasVencidas.reduce((s,f)=>s+f.monto,0))+').');
  }
  const tieneHistorial = DB.pedidos.some(p=>p.clienteId===clienteId && p.estado==='Despachado');
  if(!tieneHistorial){
    motivos.push('Es un cliente nuevo, sin historial de compras despachadas.');
  }
  return { riesgo: motivos.length>0, motivos };
}

/* ---------------- PULSE GAUGE (elemento distintivo) ---------------- */
function pulseGauge(stock, min){
  const ratio = min>0 ? stock/min : (stock>0?2:0);
  let color = 'var(--success)', peak = 14;
  if(ratio<=1){ color='var(--danger)'; peak=4; }
  else if(ratio<=1.5){ color='var(--warning)'; peak=8; }
  const midY = 11;
  const path = `M0,${midY} L18,${midY} L24,${midY-peak} L30,${midY+peak} L36,${midY} L64,${midY}`;
  return `<div class="pulse-wrap">
    <svg class="pulse-svg" viewBox="0 0 64 22"><path d="${path}" style="stroke:${color}"/></svg>
    <span class="pulse-num" style="color:${color}">${stock}</span>
  </div>`;
}

/* Progreso visual de una cotización a través de todo el ciclo de venta */
function renderStepperCot(c){
  const pedido = DB.pedidos.find(p=>p.cotId===c.id);
  const despacho = pedido ? DB.despachos.find(d=>d.pedidoId===pedido.id) : null;
  const factura = pedido ? DB.facturas.find(f=>f.pedidoId===pedido.id) : null;
  let steps = [{label:'Cotizada', cls:'step-done'}];
  if(c.estado==='Pendiente'){ steps.push({label:'Por responder', cls:'step-pending'}); }
  else if(c.estado==='Rechazada'){ steps.push({label:'Rechazada', cls:'step-rejected'}); }
  else {
    steps.push({label:'Aprobada', cls:'step-done'});
    steps.push({label:'Pedido', cls: pedido?'step-done':'step-pending'});
    steps.push({label:'Despachado', cls: despacho?'step-done':'step-pending'});
    steps.push({label:'Facturado', cls: factura?'step-done':'step-pending'});
  }
  return `<div class="stepper">${steps.map((s,i)=>`<span class="step ${s.cls}">${s.label}</span>${i<steps.length-1?'<span class="step-arrow">›</span>':''}`).join('')}</div>`;
}

/* ---------------- LOTES Y VENCIMIENTO ---------------- */
function estadoLote(fechaVenc){
  const d = daysUntil(fechaVenc);
  if(d<0) return {label:'Vencido', cls:'red', dias:d};
  if(d<=30) return {label:'Por vencer', cls:'amber', dias:d};
  return {label:'Vigente', cls:'green', dias:d};
}
function consumirLotesFEFO(producto, cantidad){
  if(!producto.lotes || !producto.lotes.length) return;
  const ordenados = producto.lotes.slice().sort((a,b)=> new Date(a.vencimiento) - new Date(b.vencimiento));
  let restante = cantidad;
  for(const lote of ordenados){
    if(restante<=0) break;
    const consumir = Math.min(lote.cantidad, restante);
    lote.cantidad -= consumir;
    restante -= consumir;
  }
  producto.lotes = producto.lotes.filter(l=>l.cantidad>0);
}
function todosLosLotes(){
  const out = [];
  DB.productos.filter(p=>!p.eliminado).forEach(p=>{
    (p.lotes||[]).forEach(l=>out.push({...l, productoId:p.id, productoNombre:p.nombre}));
  });
  return out;
}

    <tbody>${p.lotes.length? p.lotes.map((l,i)=>{

      ${puedeGestionar?`<td><button class="btn btn-ghost btn-sm" data-action="eliminar-lote" data-id="${p.id}" data-idx="${i}">Quitar</button></td>`:''}</tr>`;

function agregarLote(productoId){
  const p = DB.productos.find(x=>x.id===productoId);
  const numeroLote = val('f_lote'); const vencimiento = val('f_vencimiento'); const cantidad = Number(val('f_lotecant'))||0;
  if(!numeroLote || !vencimiento || cantidad<=0){ toast('Completa lote, vencimiento y cantidad.'); return; }
  if(!p.lotes) p.lotes=[];
  p.lotes.push({numeroLote, vencimiento, cantidad});
  p.stock += cantidad;
  logMovimiento('entrada', p.id, cantidad, 'Ingreso de lote '+numeroLote);
  saveDB(); openLotesModal(productoId); render();
  toast('Lote '+numeroLote+' agregado. '+impactoInventario(p));
}
function eliminarLote(productoId, idx){
  const p = DB.productos.find(x=>x.id===productoId);
  const lote = p.lotes[idx];
  if(!lote) return;
  p.stock = Math.max(0, p.stock - lote.cantidad);
  logMovimiento('salida', p.id, lote.cantidad, 'Corrección: eliminación de lote '+lote.numeroLote);
  p.lotes.splice(idx,1);
  saveDB(); openLotesModal(productoId); render();
  toast('Lote eliminado y stock ajustado.');
}

    <span class="li-sub mono"></span>
    <button class="remove-line" data-action="remove-oc-line">✕</button>`;
  wrap.appendChild(row);
  row.querySelector('.li-prod').addEventListener('change', function(){
    row.querySelector('.li-precio').value = this.selectedOptions[0].dataset.costo;
    updateOCTotal();
  });
  updateOCTotal();
}
function collectOCItemLines(){
  return Array.from(document.querySelectorAll('#ocItemLines .item-line')).map(row=>{
    const sel = row.querySelector('.li-prod');
    const cant = Number(row.querySelector('.li-cant').value)||0;
    const costo = Number(row.querySelector('.li-precio').value)||0;
    return {productoId:sel.value, nombre:sel.selectedOptions[0].textContent, cantidad:cant, costo, subtotal:cant*costo, recibido:0};
  }).filter(l=>l.cantidad>0);
}
function updateOCTotal(){
  const lines = collectOCItemLines();
  document.querySelectorAll('#ocItemLines .item-line').forEach((row,i)=>{
    row.querySelector('.li-sub').textContent = lines[i] ? fmtCLP(lines[i].subtotal) : '$0';
  });
  const totalEl = document.getElementById('ocTotal');
  if(totalEl) totalEl.textContent = fmtCLP(lines.reduce((s,l)=>s+l.subtotal,0));
}
function recibirOrden(id){
  const oc = DB.ordenesCompra.find(x=>x.id===id);
  showModal('Registrar recepción — '+oc.id, `
    ${oc.items.map((it,i)=>`
      <div class="field"><label>${it.nombre} — solicitado: ${it.cantidad}, ya recibido: ${it.recibido||0}</label>
      <input type="number" class="oc-recibe" data-idx="${i}" min="0" max="${it.cantidad-(it.recibido||0)}" value="${it.cantidad-(it.recibido||0)}"></div>
    `).join('')}
  `, ()=>{
    let impacto=[];
    document.querySelectorAll('.oc-recibe').forEach(inp=>{
      const idx = Number(inp.dataset.idx); const cant = Number(inp.value)||0;
      if(cant<=0) return;
      const item = oc.items[idx];
      item.recibido = (item.recibido||0)+cant;
      const prod = DB.productos.find(p=>p.id===item.productoId);
      if(prod){ prod.stock += cant; logMovimiento('entrada', prod.id, cant, 'Recepción OC '+oc.id); if(prod.stock<=prod.stockMin) impacto.push(prod.nombre); }
    });
    const totalPedido = oc.items.reduce((s,i)=>s+i.cantidad,0);
    const totalRecibido = oc.items.reduce((s,i)=>s+(i.recibido||0),0);
    oc.estado = totalRecibido>=totalPedido ? 'Recibida completa' : (totalRecibido>0?'Recibida parcial':'Pendiente');
    saveDB(); closeModal(); render();
    let msg = 'Recepción registrada para '+oc.id+' ('+oc.estado+').';
    if(impacto.length) msg += ' ⚠ Revisa stock mínimo en: '+impacto.join(', ')+'.';
    toast(msg);
  });
}

/* ---------------- COTIZACIONES ---------------- */
function estadoBadgeCot(e){
  if(e==='Pendiente') return '<span class="badge amber">Pendiente</span>';
  if(e==='Aprobada') return '<span class="badge green">Aprobada</span>';
  return '<span class="badge red">Rechazada</span>';
}
function nivelUrgenciaCot(c){
  if(c.estado!=='Pendiente') return null;
  const h = hoursSince(c.fecha);
  if(h>72) return {label:'⚠ Escalado', cls:'red', nivel:3};
  if(h>48) return {label:'Urgente', cls:'red', nivel:2};
  if(h>24) return {label:'Seguimiento', cls:'amber', nivel:1};
  return null;
}
function cotizacionVencida(c){
  return !!c.vigenciaHasta && new Date() > new Date(c.vigenciaHasta);
}

      <td style="font-size:11px;color:var(--muted);">${c.vigenciaHasta?'Válida hasta '+fmtDate(c.vigenciaHasta):'—'}</td>
      <td>${fmtCLP(c.total)}${c.descuentoPct?` <span class="badge amber" style="font-size:9.5px;">-${c.descuentoPct}%</span>`:''}${c.notas?` <span class="badge gray" title="${c.notas.replace(/"/g,'&quot;')}" style="cursor:help;">📝</span>`:''}</td>
      <td>${typeof c.plazoPago==='number' ? `<span class="badge blue">${c.plazoPago===0?'Contado':c.plazoPago+' días'}</span>` : '—'}</td>
      <td style="font-size:11.5px;color:var(--muted);">${nombreUsuario(c.asignadoA)}</td>
      <td>${renderStepperCot(c)}</td>
      <td><button class="btn btn-ghost btn-sm" data-action="ver-cotizacion" data-id="${c.id}">👁 Ver</button></td>

        <button class="btn btn-primary btn-sm" data-action="resolver-cot" data-id="${c.id}" data-estado="Aprobada">Aprobar</button>

    </tr>`;

  return `<div class="panel">
    <div class="panel-head"><h3>Ciclo de ventas — Cotizaciones</h3>
      <div class="toolbar"><button class="btn btn-primary" data-action="new-cotizacion">+ Nueva cotización</button>
        <button class="btn btn-ghost" data-action="new-venta-directa">⚡ Venta directa</button></div>
    </div>
    <div class="panel-body"><table>
      <thead><tr><th>N°</th><th>Cliente</th><th>Fecha</th><th>Vigencia</th><th>Total</th><th>Plazo</th><th>Responsable</th><th>Progreso</th><th></th><th></th><th></th></tr></thead>
      <tbody>${rows || `<tr class="empty-row"><td colspan="11">${emptyState('cotizaciones','Sin cotizaciones todavía','Crea tu primera cotización, o usa Venta directa si el cliente ya decidió comprar.')}</td></tr>`}</tbody>

function diasDesdeCondicionPago(condicion){
  if(!condicion) return 30;
  const c = condicion.toLowerCase();
  if(c.includes('contado')) return 0;
  const match = c.match(/\d+/);
  return match ? Number(match[0]) : 30;
}

function openCotizacionModal(){

    <div class="field-row">
      <div class="field"><label>Cliente</label><select id="f_cliente" data-action="cot-cliente-change">${clienteOpts}</select></div>
      <div class="field"><label>Plazo de pago</label><select id="f_plazo">

      <div class="field"><label>Responsable</label><select id="f_responsable">

      <div class="field"><label>Vigencia de la oferta</label><select id="f_vigencia">

    </div>

      <textarea id="f_notas" rows="2" placeholder="ej: precio válido por 15 días, incluye despacho a domicilio"></textarea></div>

function addItemLine(){
  const wrap = document.getElementById('itemLines');
  const row = document.createElement('div'); row.className='item-line';
  row.innerHTML = `
    <select class="li-prod">${DB.productos.filter(p=>!p.eliminado).map(p=>`<option value="${p.id}" data-precio="${p.precio}">${p.nombre} (disponible: ${stockDisponible(p)})</option>`).join('')}</select>
    <input class="li-cant" type="number" min="1" value="1">
    <input class="li-precio" type="number" value="${DB.productos[0]?DB.productos[0].precio:0}">
    <span class="li-sub mono"></span>
    <button class="remove-line" data-action="remove-cot-line">✕</button>
    <div class="li-warn" style="grid-column:1/-1;font-size:11px;color:var(--warning);"></div>`;
  wrap.appendChild(row);
  row.querySelector('.li-prod').addEventListener('change', function(){
    row.querySelector('.li-precio').value = this.selectedOptions[0].dataset.precio;
    updateCotTotal();
  });
  updateCotTotal();
}
function collectItemLines(){
  return Array.from(document.querySelectorAll('#itemLines .item-line')).map(row=>{
    const sel = row.querySelector('.li-prod');
    const cant = Number(row.querySelector('.li-cant').value)||0;
    const precio = Number(row.querySelector('.li-precio').value)||0;
    return {productoId:sel.value, nombre:sel.selectedOptions[0].textContent, cantidad:cant, precio, subtotal:cant*precio};
  }).filter(l=>l.cantidad>0);
}
function updateCotTotal(){
  const lines = collectItemLines();
  let stockWarning='';
  document.querySelectorAll('#itemLines .item-line').forEach((row,i)=>{
    row.querySelector('.li-sub').textContent = lines[i] ? fmtCLP(lines[i].subtotal) : '$0';
    if(lines[i]){
      const prod = DB.productos.find(p=>p.id===lines[i].productoId);
      const warnEl = row.querySelector('.li-warn');
      if(prod && lines[i].cantidad>stockDisponible(prod)){
        if(warnEl) warnEl.textContent = '⚠ Solo hay '+stockDisponible(prod)+' disponibles ('+prod.stock+' en stock, '+(prod.stockReservado||0)+' reservado)';
        stockWarning = 'Atención: uno o más ítems superan el stock disponible. Revisa antes de enviar la cotización al cliente.';
      } else if(warnEl){ warnEl.textContent=''; }
    }
  });
  const totalEl = document.getElementById('cotTotal');
  const subtotal = lines.reduce((s,l)=>s+l.subtotal,0);
  const descuentoInput = document.getElementById('f_descuento');
  const descuentoPct = descuentoInput ? Math.min(100, Math.max(0, Number(descuentoInput.value)||0)) : 0;
  const descuentoMonto = Math.round(subtotal * descuentoPct/100);
  const subtotalEl = document.getElementById('cotSubtotal');
  const descLineaEl = document.getElementById('cotDescuentoLinea');
  const descMontoEl = document.getElementById('cotDescuentoMonto');
  if(subtotalEl) subtotalEl.textContent = fmtCLP(subtotal);
  if(descLineaEl) descLineaEl.style.display = descuentoPct>0 ? 'block' : 'none';
  if(descMontoEl) descMontoEl.textContent = '-'+fmtCLP(descuentoMonto);
  if(totalEl) totalEl.textContent = fmtCLP(subtotal - descuentoMonto);
  const bannerEl = document.getElementById('cotStockBanner');
  if(bannerEl) bannerEl.textContent = stockWarning;
}
/* ---------------- PDF DE COTIZACIÓN Y ENVÍO POR CORREO ---------------- */
function generarPDFCotizacion(cotId){
  if(!window.jspdf){ toast('No se pudo cargar el generador de PDF. Revisa tu conexión a internet e intenta de nuevo.'); return null; }
  const { jsPDF } = window.jspdf;
  const c = DB.cotizaciones.find(x=>x.id===cotId);
  const cliente = DB.clientes.find(x=>x.id===c.clienteId);
  const emp = DB.empresa;
  const doc = new jsPDF();

  doc.setFont('helvetica','bold'); doc.setFontSize(19); doc.setTextColor(15,110,92);
  doc.text(emp.nombre||'SISCA', 14, 18);

  let hy = 24;
  doc.setFontSize(9); doc.setTextColor(90,100,95); doc.setFont('helvetica','normal');
  const lineasEmpresa = [];
  if(emp.giro) lineasEmpresa.push(emp.giro);
  if(emp.rut) lineasEmpresa.push('RUT: '+emp.rut);
  if(emp.direccion) lineasEmpresa.push(emp.direccion);
  const contacto = [emp.telefono, emp.email].filter(Boolean).join('  ·  ');
  if(contacto) lineasEmpresa.push(contacto);
  if(emp.sitioWeb) lineasEmpresa.push(emp.sitioWeb);
  lineasEmpresa.forEach(linea=>{ doc.text(linea, 14, hy); hy += 5; });

  const dividerY = hy + 3;
  doc.setDrawColor(220,227,224); doc.line(14, dividerY, 196, dividerY);

  let y = dividerY + 10;
  doc.setTextColor(20,30,25); doc.setFontSize(14); doc.setFont('helvetica','bold');
  doc.text('Cotización '+c.id, 14, y);
  y += 8;
  doc.setFontSize(10); doc.setFont('helvetica','normal');
  doc.text('Fecha: '+fmtDate(c.fecha), 14, y);
  doc.text('Estado: '+c.estado, 130, y);
  y += 6;
  doc.text('Cliente: '+(cliente?cliente.nombre:'—'), 14, y); y += 6;
  doc.text('RUT: '+(cliente?cliente.rut:'—'), 14, y); y += 6;
  doc.text('Condición de pago: '+(typeof c.plazoPago==='number' ? (c.plazoPago===0?'Contado':c.plazoPago+' días') : (cliente?cliente.condicionPago:'—')), 14, y);
  if(c.vigenciaHasta){ y += 6; doc.text('Oferta válida hasta: '+fmtDate(c.vigenciaHasta), 14, y); }
  y += 14;

  doc.setFont('helvetica','bold');
  doc.text('Producto', 14, y); doc.text('Cant.', 122, y); doc.text('P. Unitario', 145, y); doc.text('Subtotal', 175, y);
  doc.setFont('helvetica','normal');
  y += 3; doc.setDrawColor(150,150,150); doc.line(14, y, 196, y); y += 6;

  c.items.forEach(it=>{
    if(y > 265){ doc.addPage(); y = 20; }
    const nombreCorto = it.nombre.length>48 ? it.nombre.slice(0,45)+'...' : it.nombre;
    doc.text(nombreCorto, 14, y);
    doc.text(String(it.cantidad), 122, y);
    doc.text(fmtCLP(it.precio), 145, y);
    doc.text(fmtCLP(it.subtotal), 175, y);
    y += 7;
  });

  y += 3; doc.setDrawColor(150,150,150); doc.line(14, y, 196, y); y += 9;
  if(c.descuentoPct){
    doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(90,100,95);
    doc.text('Subtotal: '+fmtCLP(c.subtotal), 145, y); y += 6;
    doc.text('Descuento ('+c.descuentoPct+'%): -'+fmtCLP(c.descuentoMonto), 145, y); y += 8;
    doc.setTextColor(20,30,25);
  }
  doc.setFont('helvetica','bold'); doc.setFontSize(12);
  doc.text('Total: '+fmtCLP(c.total), 145, y);
  y += 12;

  if(c.notas){
    doc.setFont('helvetica','bold'); doc.setFontSize(9.5); doc.setTextColor(20,30,25);
    doc.text('Notas / Observaciones:', 14, y); y += 5;
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(90,100,95);
    const notasLineas = doc.splitTextToSize(c.notas, 182);
    notasLineas.forEach(linea=>{ doc.text(linea, 14, y); y += 5; });
  }

  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(140,150,145);
  doc.text('Documento generado por '+(emp.nombre||'SISCA')+'. Esta cotización no constituye una boleta ni factura tributaria.', 14, 285);

  doc.save('Cotizacion_'+c.id+'.pdf');
  return doc;
}
function enviarCotizacionPorCorreo(cotId){
  const c = DB.cotizaciones.find(x=>x.id===cotId);
  const cliente = DB.clientes.find(x=>x.id===c.clienteId);
  if(!cliente || !cliente.email){ toast('Este cliente no tiene un correo registrado. Agrégalo en Clientes → Editar.'); return; }
  const generado = generarPDFCotizacion(cotId);
  if(!generado) return;
  const asunto = encodeURIComponent('Cotización '+c.id+' — SISCA');

function liberarPedido(id){
  const p = DB.pedidos.find(x=>x.id===id);
  const riesgo = evaluarRiesgoCredito(p.clienteId);
  if(riesgo.riesgo && p.plazoPago>0){
    const box = document.getElementById('modalBox');
    box.innerHTML = `<div class="modal-head"><h3>⚠ Riesgo crediticio detectado</h3><button class="modal-close" data-action="close-modal">✕</button></div>
    <div class="modal-body">
      <p style="font-size:13.5px;color:var(--muted);margin-bottom:10px;">${clienteNombre(p.clienteId)} tiene condición de pago a ${p.plazoPago} días, pero:</p>
      <ul style="font-size:13px;color:var(--danger);padding-left:18px;margin-bottom:12px;">${riesgo.motivos.map(m=>`<li>${m}</li>`).join('')}</ul>
      <p style="font-size:12.5px;color:var(--muted);">Según la política de riesgo, se recomienda exigir pago al contado. Puedes forzar el cambio, o liberar con crédito de todas formas bajo tu responsabilidad.</p>
    </div>
    <div class="modal-foot" style="flex-wrap:wrap;">
      <button class="btn btn-ghost" data-action="close-modal">Cancelar</button>
      <button class="btn btn-danger" data-action="liberar-con-credito" data-id="${p.id}">Liberar con crédito de todas formas</button>
      <button class="btn btn-primary" data-action="liberar-a-contado" data-id="${p.id}">Exigir contado y liberar</button>
    </div>`;
    document.getElementById('overlay').classList.add('show');
    return;
  }
  showConfirm('¿Liberar '+id+' y generar factura?', 'Se generará la factura por '+fmtCLP(p.total)+' y el pedido pasará a Bodega para su preparación.', ()=>{
    closeModal(); ejecutarLiberacion(id);
  }, {confirmLabel:'Sí, liberar', danger:false});
}
function ejecutarLiberacion(id, forzarContado){
  const p = DB.pedidos.find(x=>x.id===id);
  if(forzarContado) p.plazoPago = 0;
  const plazo = typeof p.plazoPago==='number' ? p.plazoPago : 30;
  const vencimiento = new Date(Date.now()+plazo*864e5).toISOString();
  const fact = {id:uid('FAC','fact'), clienteId:p.clienteId, pedidoId:p.id, monto:p.total, fechaEmision:nowISO(), vencimiento, estado:'Pendiente'};
  DB.facturas.push(fact);
  p.estado = 'En preparación';
  saveDB(); closeModal(); render();
  toast('Pedido '+id+' liberado. Factura '+fact.id+' generada por '+fmtCLP(fact.monto)+'. Ya está disponible para Bodega.');
}

function despacharPedido(id){
  const p = DB.pedidos.find(x=>x.id===id);
  showConfirm('¿Confirmar despacho de '+id+'?',
    'Esta acción descontará el stock reservado de '+p.items.length+' producto(s) definitivamente. No se puede deshacer.',
    ()=>{ closeModal(); ejecutarDespacho(id); }, {confirmLabel:'Sí, despachar', danger:false});
}
function ejecutarDespacho(id){
  const p = DB.pedidos.find(x=>x.id===id);
  // Convierte la reserva en descuento real de stock, consumiendo lotes por FEFO (primero en vencer, primero en salir)
  let impacto = [];
  p.items.forEach(it=>{
    const prod = DB.productos.find(x=>x.id===it.productoId);
    if(prod){
      prod.stock = Math.max(0, prod.stock - it.cantidad);
      prod.stockReservado = Math.max(0, (prod.stockReservado||0) - it.cantidad);
      consumirLotesFEFO(prod, it.cantidad);
      logMovimiento('salida', prod.id, it.cantidad, 'Despacho pedido '+p.id);
      if(prod.stock<=prod.stockMin) impacto.push(prod.nombre);
    }
  });
  p.estado='Despachado';
  const desp = {id:uid('DESP','desp'), pedidoId:p.id, clienteId:p.clienteId, fecha:nowISO(), items:p.items, estadoEntrega:'En ruta', entregadoA:null, reagendamientos:[]};
  DB.despachos.push(desp);
  saveDB(); render();
  const fact = DB.facturas.find(f=>f.pedidoId===p.id);
  let msg = 'Pedido '+id+' despachado.'+(fact?' Factura '+fact.id+' ya estaba generada.':'');
  if(impacto.length) msg += ' ⚠ Atención: stock mínimo alcanzado en '+impacto.join(', ')+'.';
  toast(msg);
  openComprobanteModal(desp.id);
}

function openComprobanteModal(despachoId){
